<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<title>Poutre — entraînement doigts</title>
<meta name="description" content="Entraînement sur poutre et hangboard : programmes, timer et suivi de progression." />
<meta name="theme-color" content="#F5F2EB" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Poutre" />
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icon-192.png" type="image/png" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700;800&display=swap" rel="stylesheet" />
<style>
:root{
  --bg:#F5F2EB; --bg-2:#FFFFFF; --surface:#FFFFFF; --surface-2:#EEEAE0;
  --line:rgba(28,35,45,.10); --line-strong:rgba(28,35,45,.20);
  --chalk:#1F2733; --muted:#5D6774; --muted-2:#98A0AB;
  --hot:#E84E2A; --hot-deep:#C33D1B;
  --cool:#14B8A2; --cool-deep:#0E8877;
  --amber:#DD9A18; --amber-deep:#B87E0E;
  --font:'Archivo',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  --mono:'JetBrains Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
  --r:16px; --r-lg:22px;
  --shadow:0 1px 2px rgba(20,25,32,.05),0 4px 14px rgba(20,25,32,.05);
  --safe-b:env(safe-area-inset-bottom,0px);
  --safe-t:env(safe-area-inset-top,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:var(--font); background:var(--bg); color:var(--chalk);
  line-height:1.45; overflow-x:hidden;
  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  background-image:radial-gradient(120% 60% at 50% -10%, #FFFFFF 0%, var(--bg) 55%);
}
button{font-family:inherit;color:inherit;border:none;background:none;cursor:pointer}
input,select,textarea{font-family:inherit;color:inherit}
.mono{font-family:var(--mono);font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}
::selection{background:var(--cool);color:#06110F}

/* ---------- App shell ---------- */
#app{max-width:520px;margin:0 auto;min-height:100%;position:relative;padding-top:var(--safe-t)}
.view{padding:22px 18px 120px;animation:rise .32s cubic-bezier(.2,.8,.2,1)}
@keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

.topbar{display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin-bottom:20px}
.brand{display:flex;align-items:center;gap:10px}
.brand .glyph{width:34px;height:34px;border-radius:9px;flex:0 0 auto}
.eyebrow{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);font-weight:600}
.ver{font-family:var(--mono);font-size:9.5px;font-weight:700;color:var(--muted-2);border:1px solid var(--line);
  border-radius:6px;padding:1px 5px;margin-left:6px;letter-spacing:.05em;text-transform:none;vertical-align:middle}
h1{font-size:27px;font-weight:800;letter-spacing:-.02em;line-height:1.05}
h2{font-size:13px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);font-weight:700;margin:26px 2px 12px}
h2:first-of-type{margin-top:8px}

/* ---------- Cards ---------- */
.card{background:var(--surface);border:1px solid var(--line);
  border-radius:var(--r);padding:16px;box-shadow:var(--shadow)}
.card+.card{margin-top:12px}

/* stat chips */
.chips{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.chip{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:13px 12px;text-align:center;box-shadow:var(--shadow)}
.chip .n{font-family:var(--mono);font-size:24px;font-weight:800;line-height:1;letter-spacing:-.03em}
.chip .l{font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-top:7px;font-weight:600}
.chip.hot .n{color:var(--hot-deep)} .chip.cool .n{color:var(--cool-deep)} .chip.amber .n{color:var(--amber-deep)}

/* ---------- Program card ---------- */
.prog{position:relative;overflow:hidden;display:flex;flex-direction:column;gap:12px}
.prog .rail{position:absolute;left:0;top:0;bottom:0;width:4px}
.prog.hot .rail{background:linear-gradient(var(--hot),var(--hot-deep))}
.prog.cool .rail{background:linear-gradient(var(--cool),var(--cool-deep))}
.prog.amber .rail{background:linear-gradient(var(--amber),var(--amber-deep))}
.prog-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;padding-left:8px}
.prog-name{font-size:18px;font-weight:800;letter-spacing:-.01em}
.prog-type{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);font-weight:700;margin-top:2px}
.prog-desc{font-size:13.5px;color:var(--muted);padding-left:8px}
.prog-meta{display:flex;flex-wrap:wrap;gap:6px;padding-left:8px}
.tag{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--chalk);
  background:rgba(28,35,45,.05);border:1px solid var(--line);border-radius:7px;padding:4px 8px;white-space:nowrap}
.tag b{color:var(--cool-deep);font-weight:800}
.prog-actions{display:flex;gap:8px;padding-left:8px;margin-top:2px}

/* ---------- Buttons ---------- */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;
  font-weight:700;font-size:15px;letter-spacing:.01em;border-radius:13px;padding:13px 16px;
  transition:transform .12s,filter .12s,background .12s;user-select:none}
.btn:active{transform:scale(.97)}
.btn-primary{background:linear-gradient(180deg,var(--cool),var(--cool-deep));color:#FFFFFF;flex:1;box-shadow:0 2px 8px rgba(14,136,119,.28)}
.btn-primary:active{filter:brightness(1.06)}
.btn-hot{background:linear-gradient(180deg,var(--hot),var(--hot-deep));color:#FFFFFF;flex:1}
.btn-ghost{background:rgba(28,35,45,.05);border:1px solid var(--line);color:var(--chalk)}
.btn-sm{padding:9px 12px;font-size:13px;border-radius:10px}
.btn-block{width:100%}
.btn:disabled{opacity:.4;pointer-events:none}
.icon-btn{width:40px;height:40px;border-radius:11px;background:rgba(28,35,45,.05);
  border:1px solid var(--line);display:grid;place-items:center;flex:0 0 auto}
.icon-btn svg{width:18px;height:18px;stroke:var(--chalk);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* ---------- Bottom nav ---------- */
.nav{position:fixed;left:0;right:0;bottom:0;z-index:40;
  background:rgba(250,248,243,.88);backdrop-filter:blur(18px);
  border-top:1px solid var(--line);padding:8px 12px calc(8px + var(--safe-b))}
.nav-inner{max-width:520px;margin:0 auto;display:grid;grid-template-columns:repeat(3,1fr)}
.nav button{display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px 4px;border-radius:12px;color:var(--muted-2);font-size:10.5px;font-weight:700;letter-spacing:.04em}
.nav button svg{width:23px;height:23px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.nav button.active{color:var(--cool-deep)}

/* ---------- Empty state ---------- */
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.empty svg{width:44px;height:44px;stroke:var(--muted-2);fill:none;stroke-width:1.6;margin-bottom:14px}
.empty p{font-size:14px;max-width:260px;margin:0 auto}

/* ---------- Modal / sheet ---------- */
.sheet-bg{position:fixed;inset:0;z-index:60;background:rgba(20,25,32,.38);backdrop-filter:blur(3px);
  display:flex;align-items:flex-end;justify-content:center;opacity:0;animation:fade .2s forwards}
@keyframes fade{to{opacity:1}}
.sheet{width:100%;max-width:520px;background:var(--bg-2);border:1px solid var(--line);
  border-radius:24px 24px 0 0;padding:8px 18px calc(22px + var(--safe-b));max-height:92vh;overflow-y:auto;
  transform:translateY(100%);animation:up .34s cubic-bezier(.2,.85,.2,1) forwards;
  box-shadow:0 -12px 40px rgba(20,25,32,.18)}
@keyframes up{to{transform:none}}
.grab{width:38px;height:4px;border-radius:3px;background:var(--line-strong);margin:6px auto 14px}
.sheet h3{font-size:20px;font-weight:800;letter-spacing:-.01em;margin-bottom:4px}
.sheet .sub{color:var(--muted);font-size:13.5px;margin-bottom:16px}

/* form */
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:700;margin-bottom:7px}
.input,select.input{width:100%;background:var(--bg);border:1px solid var(--line);border-radius:12px;
  padding:12px 13px;font-size:15px;color:var(--chalk);appearance:none}
.input:focus,select.input:focus{outline:none;border-color:var(--cool-deep)}
textarea.input{resize:vertical;min-height:64px;line-height:1.4}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.selectwrap{position:relative}
.selectwrap::after{content:"";position:absolute;right:14px;top:50%;width:8px;height:8px;border-right:2px solid var(--muted);border-bottom:2px solid var(--muted);transform:translateY(-70%) rotate(45deg);pointer-events:none}

/* stepper */
.stepper{display:flex;align-items:stretch;background:var(--bg);border:1px solid var(--line);border-radius:12px;overflow:hidden}
.stepper button{width:44px;font-size:22px;font-weight:700;color:var(--cool-deep);background:rgba(20,184,162,.08)}
.stepper button:active{background:rgba(20,184,162,.18)}
.stepper .val{flex:1;text-align:center;font-family:var(--mono);font-weight:800;font-size:17px;align-self:center;padding:11px 0}
.stepper .val small{color:var(--muted);font-weight:600;font-size:12px;margin-left:2px}

/* RPE */
.rpe{display:flex;gap:6px}
.rpe button{flex:1;aspect-ratio:1;border-radius:10px;background:var(--bg);border:1px solid var(--line);
  font-family:var(--mono);font-weight:800;font-size:15px;color:var(--muted)}
.rpe button.on{background:linear-gradient(180deg,var(--hot),var(--hot-deep));color:#FFFFFF;border-color:transparent}

/* history rows */
.hist{display:flex;align-items:center;gap:12px;padding:13px 4px;border-bottom:1px solid var(--line)}
.hist:last-child{border-bottom:none}
.hist .dot{width:10px;height:10px;border-radius:50%;flex:0 0 auto}
.hist .main{flex:1;min-width:0}
.hist .t{font-weight:700;font-size:14.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hist .s{font-size:12px;color:var(--muted);font-family:var(--mono);margin-top:2px}
.hist .r{font-family:var(--mono);font-weight:800;font-size:13px;color:var(--muted);text-align:right}
.hist .r b{display:block;color:var(--chalk);font-size:16px}

/* chart */
.chartwrap{padding:6px 2px 0}
canvas{width:100%;display:block}
.legend{display:flex;gap:14px;justify-content:center;margin-top:8px;font-size:11px;color:var(--muted)}
.legend span{display:inline-flex;align-items:center;gap:6px}
.legend i{width:10px;height:10px;border-radius:3px;display:inline-block}

/* ---------- Active session (full screen) ---------- */
#session{position:fixed;inset:0;z-index:80;display:none;flex-direction:column;
  color:#fff;transition:background .35s ease}
#session.on{display:flex}
.sess-bg-prep{background:radial-gradient(130% 90% at 50% 20%,#E9A93B,#7A5406)}
.sess-bg-hang{background:radial-gradient(130% 90% at 50% 25%,var(--hot),var(--hot-deep) 70%,#5c1c0c)}
.sess-bg-restRep{background:radial-gradient(130% 90% at 50% 25%,var(--cool),var(--cool-deep) 72%,#0a4c44)}
.sess-bg-restSet{background:radial-gradient(130% 90% at 50% 25%,#3aa0d6,#16607f 72%,#0a3346)}
.sess-bg-done{background:radial-gradient(130% 90% at 50% 25%,#2CC28A,#0f5c40)}
.sess-top{display:flex;justify-content:space-between;align-items:center;padding:calc(14px + var(--safe-t)) 20px 0}
.sess-top .pname{font-weight:800;font-size:15px;opacity:.9}
.sess-x{width:40px;height:40px;border-radius:12px;background:rgba(0,0,0,.22);display:grid;place-items:center}
.sess-x svg{width:20px;height:20px;stroke:#fff;fill:none;stroke-width:2.4;stroke-linecap:round}
.sess-core{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;text-align:center;padding:0 20px}
.phase-label{font-size:15px;font-weight:800;letter-spacing:.28em;text-transform:uppercase;opacity:.82}
.count{font-family:var(--mono);font-weight:800;font-size:clamp(96px,34vw,168px);line-height:.9;letter-spacing:-.04em;
  text-shadow:0 6px 40px rgba(0,0,0,.28);font-variant-numeric:tabular-nums}
.count small{font-size:.28em;font-weight:700;opacity:.7;margin-left:6px}
.phase-sub{font-family:var(--mono);font-weight:700;font-size:15px;opacity:.86;margin-top:6px}
.nextup{font-size:12.5px;letter-spacing:.06em;opacity:.62;margin-top:10px;text-transform:uppercase;font-weight:700}

/* rep/set ladder */
.ladder{padding:12px 20px 4px;display:flex;flex-direction:column;gap:8px}
.ladder .setrow{display:flex;align-items:center;gap:7px}
.ladder .setno{font-family:var(--mono);font-size:11px;font-weight:800;opacity:.6;width:26px;flex:0 0 auto}
.ladder .rungs{display:flex;gap:5px;flex:1;flex-wrap:wrap}
.rung{height:8px;flex:1;min-width:8px;border-radius:4px;background:rgba(255,255,255,.22);transition:background .25s}
.rung.done{background:#fff}
.rung.cur{background:#fff;animation:pulse 1s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}

.sess-ctrl{display:flex;gap:12px;padding:14px 20px calc(22px + var(--safe-b))}
.sctl{flex:1;height:56px;border-radius:16px;background:rgba(0,0,0,.24);color:#fff;font-weight:800;font-size:15px;
  display:flex;align-items:center;justify-content:center;gap:8px;letter-spacing:.02em}
.sctl svg{width:20px;height:20px;stroke:#fff;fill:#fff;stroke-width:1.5}
.sctl.wide{flex:1.5}

/* séance du jour */
.rec-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.prog .rec-head{padding-left:8px}
.rec-badge{display:inline-block;font-size:10.5px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;padding:5px 10px;border-radius:999px}
.rec-badge.cool{background:rgba(20,184,162,.14);color:var(--cool-deep)}
.rec-badge.hot{background:rgba(232,78,42,.12);color:var(--hot-deep)}
.rec-badge.amber{background:rgba(221,154,24,.16);color:var(--amber-deep)}
.rec-title{font-size:20px;font-weight:800;letter-spacing:-.01em}
.rec-txt{font-size:13.5px;color:var(--muted);margin:6px 0 12px}
.goalseg{display:flex;gap:6px}
.goalseg button{flex:1;padding:11px 8px;border-radius:12px;background:var(--bg);border:1px solid var(--line);font-weight:700;font-size:13.5px;color:var(--muted)}
.goalseg button.on{background:linear-gradient(180deg,var(--cool),var(--cool-deep));color:#fff;border-color:transparent}
.days{display:flex;gap:6px}
.days button{flex:1;aspect-ratio:1;border-radius:50%;background:var(--bg);border:1px solid var(--line);font-weight:800;font-size:13px;color:var(--muted)}
.days button.on{background:linear-gradient(180deg,var(--cool),var(--cool-deep));color:#fff;border-color:transparent}

/* cycle par blocs */
.cyctoggle{width:100%;display:flex;align-items:center;justify-content:space-between;gap:10px;
  padding:13px 14px;border-radius:12px;background:var(--bg);border:1px solid var(--line);font-weight:700;font-size:14px;color:var(--muted);text-align:left}
.cyctoggle .sw{width:44px;height:26px;border-radius:999px;background:var(--line-strong);position:relative;flex:0 0 auto;transition:background .2s}
.cyctoggle .sw::after{content:"";position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:transform .2s;box-shadow:0 1px 3px rgba(20,25,32,.25)}
.cyctoggle.on{color:var(--chalk);border-color:var(--cool-deep)}
.cyctoggle.on .sw{background:var(--cool-deep)}
.cyctoggle.on .sw::after{transform:translateX(18px)}
.cycrows{display:flex;flex-direction:column;gap:6px;margin-top:10px}
.cycrow{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 12px;
  border-radius:11px;background:var(--bg);border:1px solid var(--line);font-size:13px;font-weight:600;color:var(--muted)}
.cycrow .wk{font-family:var(--mono);font-size:11px;font-weight:800}
.cycrow.cur{background:rgba(20,184,162,.10);border-color:var(--cool-deep);color:var(--chalk)}
.cycrow.cur .wk{color:var(--cool-deep)}

/* endurance : sélecteurs en pastilles + blocs de séance */
.pills{display:flex;flex-wrap:wrap;gap:6px}
.pills button{padding:9px 12px;border-radius:999px;background:var(--bg);border:1px solid var(--line);
  font-weight:700;font-size:12.5px;color:var(--muted)}
.pills button.on{background:linear-gradient(180deg,var(--cool),var(--cool-deep));color:#fff;border-color:transparent}
.cdblocks{list-style:none;padding:0;margin:0}
.cdblocks li{position:relative;padding:9px 0 9px 20px;border-bottom:1px solid var(--line);font-size:13.5px;line-height:1.45}
.cdblocks li:last-child{border-bottom:none}
.cdblocks li:before{content:"";position:absolute;left:2px;top:16px;width:7px;height:7px;border-radius:50%;background:var(--cool)}

/* progrès par domaine */
.drow{display:flex;align-items:center;gap:10px;margin:9px 0}
.drow .dl{width:62px;font-size:12px;font-weight:700}
.dtrack{flex:1;height:10px;border-radius:5px;background:rgba(28,35,45,.08);position:relative;overflow:hidden}
.dfill{position:absolute;left:0;top:0;bottom:0;border-radius:5px;transition:width .3s}
.dmin{position:absolute;top:0;bottom:0;width:2px;background:rgba(28,35,45,.30)}
.drow .dv{font-family:var(--mono);font-size:11px;color:var(--muted);width:46px;text-align:right;font-weight:700}
.wgrid{display:flex;justify-content:space-between;align-items:center;padding:8px 2px;border-bottom:1px solid var(--line);font-family:var(--mono);font-size:12px}
.wgrid:last-child{border-bottom:none}
.wgrid .wl{color:var(--muted);font-weight:600;font-size:11px}
.wgrid b{font-weight:800}
.wgrid .ok{color:var(--cool-deep)} .wgrid .ko{color:var(--muted-2)}

/* bibliothèque : sections repliables + lignes compactes */
.acc{width:100%;display:flex;align-items:center;gap:10px;padding:14px;border-radius:var(--r);
  background:var(--surface);border:1px solid var(--line);box-shadow:var(--shadow);margin-top:10px;text-align:left}
.acc .al{flex:1;font-weight:800;font-size:15px;letter-spacing:-.01em}
.acc .an{font-family:var(--mono);font-size:11px;color:var(--muted);font-weight:700;
  background:rgba(28,35,45,.05);border:1px solid var(--line);padding:2px 8px;border-radius:999px}
.acc .chev{width:9px;height:9px;border-right:2px solid var(--muted);border-bottom:2px solid var(--muted);
  transform:rotate(45deg);transition:transform .2s;margin:0 4px 3px 0}
.acc.open .chev{transform:rotate(-135deg);margin:3px 4px 0 0}
.accbody{display:none;padding:2px 0 0}
.acc.open+.accbody{display:block}
.prow{display:flex;align-items:center;gap:11px;padding:11px 12px;background:var(--bg-2);
  border:1px solid var(--line);border-radius:12px;margin-top:6px;box-shadow:var(--shadow);cursor:pointer}
.prow .pdot{width:9px;height:9px;border-radius:50%;flex:0 0 auto}
.prow .pmain{flex:1;min-width:0}
.prow .pn{font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prow .ps{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:2px}

/* plan du jour (programme général) */
.slotrow{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--line)}
.slotrow:last-of-type{border-bottom:none}
.sdot{width:10px;height:10px;border-radius:50%;flex:0 0 auto}
.smain{flex:1;min-width:0}
.smain .st{font-weight:800;font-size:14px}
.smain .st small{font-weight:600;color:var(--muted);font-size:12px}
.smain .ss{font-family:var(--mono);font-size:11.5px;color:var(--muted);margin-top:2px}
.quota{font-family:var(--mono);font-size:11.5px;color:var(--muted);margin:4px 0 10px;font-weight:700}
.quota b{color:var(--cool-deep)}

/* toast */
#toast{position:fixed;left:50%;bottom:calc(96px + var(--safe-b));transform:translateX(-50%) translateY(20px);
  background:#FFFFFF;border:1px solid var(--line-strong);color:var(--chalk);
  padding:12px 18px;border-radius:14px;font-size:13.5px;font-weight:600;z-index:90;opacity:0;pointer-events:none;

<script>
"use strict";
/* ============================================================
   POUTRE — entraînement doigts (poutre / hangboard)
   PWA autonome, sans dépendance. Persistance localStorage
   avec repli mémoire (fonctionne aussi en aperçu sandbox).
   ============================================================ */

const APP_VERSION = "v37"; // incrémentée à chaque mise à jour — doit correspondre au cache du service worker

/* ---------- Persistance ---------- */
const store = (() => {
  let mem = {}, ok = true;
  try { localStorage.setItem("__t","1"); localStorage.removeItem("__t"); }
  catch(e){ ok = false; }
  return {
    get(k,d){ try{ if(ok){const v=localStorage.getItem(k); return v==null?d:JSON.parse(v);} }catch(e){} return (k in mem)?mem[k]:d; },
    set(k,v){ try{ if(ok){localStorage.setItem(k,JSON.stringify(v)); return;} }catch(e){} mem[k]=v; }
  };
})();

/* ---------- Vocabulaire ---------- */
const GRIPS = ["Bac / ouvert","Réglette tendue","Réglette semi-arquée","Arqué complet","Pince","Trois doigts","Bidoigt","Mono-doigt","Corps entier"];

/* ---------- Programmes intégrés ---------- */
const PRESETS = [
  /* ===== POUTRE / HANGBOARD ===== */

  /* ===== TRIANGLE YY VERTICAL ===== */

    technique:"Les triangles bougent : engage les épaules et gaine tout le corps pour stabiliser AVANT de charger les doigts. Sangles de même longueur, mains symétriques. Le système 360° te laisse changer de prise entre les séries.",

  { id:"tri-rep", name:"Triangle — répéteurs 7:3", type:"Force-endurance", cat:"triangle", color:"cool", grip:"Réglette semi-arquée", edgeMm:20, addedKg:0,

  /* ===== GAINAGE ===== */

    gains:"Le gainage transmet la force des pieds aux mains : c'est lui qui garde les pieds sur les prises en dévers et qui tient les positions loin du corps. Le maillon le plus rentable hors doigts." },

    desc:"Suspendu à la barre ou aux triangles (bacs) : enchaîne un maximum de relevés de genoux propres pendant 20 s, puis 40 s de repos.",
    technique:"Épaules actives, zéro balancier : monte les genoux vers la poitrine par les abdos, redescends contrôlé. Si tu te balances, ralentis. Version dure : jambes tendues jusqu'à l'horizontale.",

    gains:"Gainage maximal + force des fléchisseurs de hanche et des épaules : la base des mouvements de compression, des talons hauts et du bloc physique." },

  /* ===== MINI CRUX ===== */
  { id:"mcx-warm", name:"Mini Crux — échauffement nomade", type:"Préparation", cat:"minicrux", color:"cool", grip:"Réglette tendue", edgeMm:25, addedKg:0, effortLabel:"Tirage",
    prepSec:10, hangSec:10, restRepSec:20, reps:8, restSetSec:0, sets:1, builtin:true,

    technique:"Assis ou debout, dos droit. Élastique sous le pied ou petit poids au sol. Tire lentement jusqu'à tension légère, tiens 10 s, relâche en contrôle. Change de main à chaque rep, descends de réglette toutes les 2-3 reps.",
    gains:"Doigts chauds en 5 minutes n'importe où — la meilleure prévention des blessures du premier essai à froid en falaise." },
  { id:"mcx-lift", name:"Mini Crux — soulevés max", type:"Force maximale", cat:"minicrux", color:"hot", grip:"Réglette semi-arquée", edgeMm:20, addedKg:25, effortLabel:"Tirage",
    prepSec:15, hangSec:7, restRepSec:0, reps:1, restSetSec:60, sets:6, builtin:true,

    gains:"Force maximale des doigts dosable au kilo près, chaque main travaillée séparément (révèle et corrige les déséquilibres), sans aucune contrainte d'épaule. Résistance de l'agrès : 120 kg." },
  { id:"mcx-edge10", name:"Mini Crux — micro 10 mm", type:"Force maximale", cat:"minicrux", color:"hot", grip:"Réglette semi-arquée", edgeMm:10, addedKg:10, effortLabel:"Tirage",
    prepSec:15, hangSec:10, restRepSec:0, reps:1, restSetSec:90, sets:5, builtin:true,
    desc:"Soulevés légers sur la réglette de 10 mm : la précision de contact avant la force brute. Charge modérée, tenue parfaite.",

  /* ===== MINI CRUX — SPÉCIAL PINCE ===== */
  { id:"mcx-pinch-max", name:"Pince max — soulevés", type:"Force maximale", cat:"mcxpince", color:"hot", grip:"Pince", edgeMm:50, addedKg:15, effortLabel:"Serrage",

    desc:"Le cœur du travail de pince : Mini Crux saisi par sa pince large (~50 mm), relié à une charge, soulevé d'un bras. 7 s de serrage max, alterne les mains.",
    technique:"Le pouce s'oppose franchement aux doigts — c'est LUI le moteur. Poignet neutre, avant-bras vertical au-dessus de la charge. Serre AVANT de décoller, monte 2-3 cm, tiens. Si le bloc glisse ou pivote, la charge est trop lourde.",
    gains:"Force de pince pure (pouce, éminence thénar, fléchisseurs) — la préhension la moins entraînable sur poutre classique et pourtant décisive sur arêtes, colonnettes et blocs modernes." },
  { id:"mcx-pinch-rep", name:"Pince — répéteurs 7:3", type:"Force-endurance", cat:"mcxpince", color:"cool", grip:"Pince", edgeMm:50, addedKg:8, effortLabel:"Serrage",
    prepSec:12, hangSec:7, restRepSec:3, reps:6, restSetSec:120, sets:3, builtin:true,
    desc:"Le protocole 7:3 appliqué à la pince : 6 serrages de 7 s par série, charge modérée. Une série par main, en alternance.",
    technique:"Charge à ~60 % de ton max de pince. Pendant les 3 s de repos, pose la charge sans lâcher le bloc pour garder le placement. Fais la série complète d'une main, puis change — note la différence G/D dans tes notes.",
    gains:"Endurance de serrage : la capacité à tenir des pinces sur la durée d'une voie, pas juste un mouvement. Le pouce se fatigue différemment des doigts — il faut l'entraîner spécifiquement." },
  { id:"mcx-pinch-end", name:"Pince — tenues longues", type:"Endurance", cat:"mcxpince", color:"amber", grip:"Pince", edgeMm:50, addedKg:10, effortLabel:"Serrage",
    prepSec:12, hangSec:30, restRepSec:60, reps:3, restSetSec:0, sets:2, builtin:true,
    desc:"3 tenues de 30 s en pince à charge légère-modérée, 1 min de repos. Marche aussi en portage : le Mini Crux tenu en pince, charge suspendue, en marchant sur place (farmer walk).",

    gains:"Capacité de la pince sous fatigue prolongée + endurance du poignet et de l'avant-bras — le fond de commerce des longues sections à colonnettes et des dévers à plats." },
  /* ===== TRACTIONS ===== */
  { id:"pull-simple", name:"Tractions — séries simples", type:"Force générale", cat:"traction", color:"cool", grip:"Bac / ouvert", edgeMm:0, addedKg:0, effortLabel:"Tractions",
    prepSec:12, hangSec:30, restRepSec:0, reps:1, restSetSec:120, sets:5, builtin:true,
    desc:"5 séries de tractions au poids du corps, sur barre ou sur les bacs des triangles. Chaque fenêtre de 30 s : fais 60–80 % de ton maximum de reps, propres.",
    technique:"Départ bras tendus, épaules engagées avant de tirer, menton au-dessus de la barre sans donner de coup de reins, descente contrôlée complète. Arrête la série 2 reps avant l'échec — la qualité construit la force, l'échec construit la fatigue.",
    gains:"Force de tirage générale, la base du grimpeur. Progression : quand le RPE de séance passe à 7 ou moins, ajoute 1 rep par série la fois suivante. Quand tu dépasses ~12 reps par série, passe aux tractions lestées." },
  { id:"pull-weight", name:"Tractions lestées", type:"Force maximale", cat:"traction", color:"hot", grip:"Bac / ouvert", edgeMm:0, addedKg:10, effortLabel:"Tractions",
    prepSec:15, hangSec:20, restRepSec:0, reps:1, restSetSec:180, sets:5, builtin:true,
    desc:"5 séries de 3 à 5 tractions lourdes avec lest (ceinture, gilet ou sac). Fenêtre de 20 s par série, 3 min de repos complet.",
    technique:"Échauffe-toi avec 2 séries au poids du corps d'abord. Lest accroché au baudrier ou en gilet, jamais tenu entre les jambes en séries lourdes. Amplitude complète stricte : bras tendus en bas, menton franchement au-dessus. 3-5 reps max par série — si tu en fais 6, monte la charge.",
    gains:"Force maximale de tirage — le transfert le plus direct vers les mouvements durs et les blocages. L'app suit ta progression : RPE ≤ 6 → +2 kg proposés, RPE 7 → +1 kg, RPE ≥ 9 → on redescend." },
  { id:"pull-frenchies", name:"Frenchies — blocages", type:"Force-endurance", cat:"traction", color:"amber", grip:"Bac / ouvert", edgeMm:0, addedKg:0, effortLabel:"Blocage",
    prepSec:15, hangSec:25, restRepSec:20, reps:3, restSetSec:180, sets:3, builtin:true,
    desc:"Le classique de l'escalade : 1 cycle = traction complète puis blocage 7 s en haut, descente à 90° blocage 7 s, descente à 120° blocage 7 s, puis bras tendus. 3 cycles par série (une fenêtre de 25 s = un cycle).",
    technique:"Chaque blocage est TENU immobile — pas de tremblement toléré, sinon écourte. Les angles comptent : bras cassés en haut, coudes à l'équerre à 90°, presque tendus à 120°. Épaules basses en permanence. Si 3 cycles passent facilement, ajoute un blocage ou du lest léger.",
    gains:"Force de blocage à tous les angles — exactement ce qui te tient sur une prise pendant que l'autre main avance. Le meilleur exercice de tirage spécifique escalade, et le plus redoutablement fatigant." },
  /* ===== ANTAGONISTES ===== */
  { id:"anta-ext", name:"Extensions de doigts — élastique", type:"Antagonistes", cat:"antago", color:"cool", grip:"Corps entier", edgeMm:0, addedKg:0, effortLabel:"Extensions",
    prepSec:5, hangSec:30, restRepSec:15, reps:2, restSetSec:45, sets:3, builtin:true,
    desc:"Élastique (ou gros élastique de bureau) autour du bout des doigts : ouvre la main en grand contre la résistance, en rythme lent. Chaque série = 30 s main gauche (rep 1) puis main droite (rep 2).",
    technique:"L'élastique se place sur les dernières phalanges, pouce inclus. Ouvre COMPLÈTEMENT — les doigts s'écartent et s'étendent à fond — puis referme en freinant. ~15-20 ouvertures par fenêtre de 30 s. Ça doit chauffer le dos de l'avant-bras, jamais faire mal.",
    gains:"Rééquilibre fléchisseurs/extenseurs après le tirage : la prévention n°1 de l'épicondylite (coude du grimpeur) et des douleurs de poignet. 3 minutes qui économisent des mois de blessure." },
  { id:"anta-pompes", name:"Pompes — variations", type:"Antagonistes", cat:"antago", color:"amber", grip:"Corps entier", edgeMm:0, addedKg:0, effortLabel:"Pompes",
    prepSec:8, hangSec:30, restRepSec:0, reps:1, restSetSec:60, sets:4, builtin:true,
    desc:"4 fenêtres de 30 s de pompes, une variation par série : 1) standard, 2) prise large, 3) diamant (mains serrées), 4) pieds surélevés ou pompes hindu. Adapte sur les genoux si besoin — la qualité prime.",
    technique:"Corps gainé en planche parfaite du début à la fin — si le bassin s'affaisse, passe sur les genoux. Descente poitrine au sol, coudes à ~45° du corps (pas en ailes de poulet). Vise 8-15 reps propres par fenêtre, garde 2 reps de marge.",
    gains:"Renforce pectoraux, triceps et deltoïdes antérieurs — toute la chaîne de poussée que la grimpe n'entraîne jamais. Stabilise l'épaule, équilibre la posture « dos de grimpeur » et protège en réception de mouvements." },
  { id:"anta-poignets", name:"Poignets — extensions inversées", type:"Antagonistes", cat:"antago", color:"hot", grip:"Corps entier", edgeMm:0, addedKg:2, effortLabel:"Extensions",
    prepSec:5, hangSec:30, restRepSec:15, reps:2, restSetSec:45, sets:2, builtin:true,
    desc:"Avant-bras posé sur la cuisse ou une table, paume vers le bas, petit poids (1-3 kg) ou élastique en main : lève le dos de la main vers le haut, lentement. 30 s par côté, rep 1 = gauche, rep 2 = droite.",
    technique:"Seul le poignet bouge, l'avant-bras reste plaqué. Monte en 1 s, redescends en 2-3 s en freinant — l'excentrique est la partie qui compte. Charge légère : 12-15 reps par fenêtre avec une brûlure douce, jamais de douleur vive.",
    gains:"Extenseurs du poignet solides = poignet stable sur les réglettes, les pinces et les plats. Le complément direct des extensions de doigts pour des coudes en bonne santé sur le long terme." },
  { id:"anta-pike", name:"Pompes piquées — épaules", type:"Antagonistes", cat:"antago", color:"hot", grip:"Corps entier", edgeMm:0, addedKg:0, effortLabel:"Pompes",

    desc:"3 fenêtres de 30 s en position de V inversé (fesses hautes, jambes tendues) : plie les coudes pour amener le sommet du crâne vers le sol entre les mains, puis pousse. La poussée verticale du grimpeur — le geste du mantle.",
    technique:"Hanches le plus haut possible, regard vers les pieds, mains largeur d'épaules. La tête descend ENTRE les mains (pas devant), coudes à ~45°. Vise 5-10 reps propres par fenêtre. Progression : pieds surélevés sur une chaise, puis pompes en équilibre contre un mur. Régression : réduis l'amplitude, pas la position.",
    gains:"Deltoïdes, trapèzes et dentelé en poussée verticale : la force du rétablissement (mantle), la stabilité de l'épaule au-dessus de la tête et l'équilibre parfait du haut du corps face au tirage permanent de la grimpe." },
  { id:"core-dorsal", name:"Chaîne postérieure — circuit", type:"Gainage", cat:"gainage", color:"hot", grip:"Corps entier", edgeMm:0, addedKg:0, effortLabel:"Gainage",
    prepSec:10, hangSec:35, restRepSec:20, reps:3, restSetSec:60, sets:3, builtin:true,
    desc:"Le miroir de la planche : chaque série = planche inversée (rep 1, face au plafond, appui talons-mains), pont fessier tenu haut (rep 2), superman bras-jambes décollés (rep 3). 35 s d'effort, 20 s de transition.",
    technique:"Planche inversée : corps aligné épaules-chevilles, hanches POUSSÉES vers le haut, épaules basses. Pont : serre les fessiers au sommet, ne creuse pas les lombaires — version dure sur une jambe. Superman : décolle bras et cuisses ensemble, nuque longue, regard au sol.",
    gains:"Fessiers, ischios et érecteurs du rachis : la chaîne qui verrouille les talons (heel hooks), plaque les hanches au mur en dévers et tient la tension du corps pieds-mains. Le complément indispensable de la planche — la plupart des grimpeurs ne travaillent que la face avant." },

function estDuration(p){
  let t = p.prepSec;
  t += p.sets*(p.reps*p.hangSec + Math.max(0,p.reps-1)*p.restRepSec);
  t += Math.max(0,p.sets-1)*p.restSetSec;

}

function weekMinsMet(c){ return Object.keys(WEEK_TARGETS).every(k=>c[k]>=WEEK_TARGETS[k].min); }
function weekFullStreak(){
  const monNow = mondayOf(new Date()).getTime();
  let streak = weekMinsMet(weekCountsAt(monNow)) ? 1 : 0; // semaine en cours si déjà complète
  for(let i=1;i<520;i++){
    if(weekMinsMet(weekCountsAt(monNow - i*7*864e5))) streak++;
    else break;
  }
  return streak;
}

const audio = (() => {
  let ctx=null;
  function ensure(){ if(!ctx){ try{ ctx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } if(ctx&&ctx.state==="suspended") ctx.resume(); return ctx; }
  function beep(freq,dur,vol=0.14,type="sine"){
    if(!settings.sound) return; const c=ensure(); if(!c) return;
    const o=c.createOscillator(), g=c.createGain();
    o.type=type; o.frequency.value=freq; o.connect(g); g.connect(c.destination);
    const t=c.currentTime;
    g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(vol,t+0.012);
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.start(t); o.stop(t+dur+0.02);
  }
  return {
    unlock:ensure,
    tick(){ beep(760,0.09,0.10,"triangle"); },
    go(){ beep(1050,0.22,0.17,"sine"); },
    rest(){ beep(430,0.22,0.14,"sine"); },
    done(){ [660,880,1180].forEach((f,i)=>setTimeout(()=>beep(f,0.3,0.16,"sine"),i*140)); },
  };
})();

function trackOn(k){ return !!(plans5 && plans5[k] && plans5[k].on); }
function anyTrackOn(){ return TRACK5.some(([k])=>trackOn(k)); }
function trainDays(){ return (plans5 && plans5.days && plans5.days.length) ? plans5.days : [0,1,2,3,4,5,6]; }
function trackCyc(k){
  if(!trackOn(k)) return null;
  const t = plans5[k];
  if(!t.weeks || !t.start) return { mode:"entretien", deload:false };
  if(k==="escalade"){
    const blocks = cycleBlocks(t.goal||"mixte", t.weeks);
    const total = blocks.reduce((a,b)=>a+b.weeks,0);
    const w = Math.floor((mondayOf(new Date()) - mondayOf(new Date(t.start)))/(7*864e5));
    const week = ((w % total)+total)%total;
    let acc=0, cur=blocks[0], bw=0;
    for(const b of blocks){ if(week < acc+b.weeks){ cur=b; bw=week-acc; break; } acc+=b.weeks; }
    return { mode:"cycle", week:week+1, total, deload:cur.rot==="deload", rot:cur.rot,
      blockName:cur.name, blockWeek:bw+1, blockWeeks:cur.weeks };
  }
  const total = t.weeks;
  const w = Math.floor((mondayOf(new Date()) - mondayOf(new Date(t.start)))/(7*864e5));
  const week = ((w % total)+total)%total + 1;              // 1-based, boucle
  return { mode:"cycle", week, total, deload: week % 4 === 0 }; // décharge toutes les 4 semaines
}
function trackDeload(k){ const c=trackCyc(k); return !!(c && c.deload); }

}

function weekSessions(){

  sessions.forEach(s=>{ const t=new Date(s.dateISO).getTime();
    if(t>=monTime && t<end){ if(PREP_IDS.has(s.programId)) return; const d=domainOf(s.programId); if(d) c[d]++; } });

}
const PREP_IDS = new Set(["echauffement","mcx-warm"]); // préparations : jamais comptées comme séances
function weekCounts(){

  weekSessions().forEach(s=>{ if(PREP_IDS.has(s.programId)) return; const d=domainOf(s.programId); if(d) c[d]++; });

function generalDayPlan(deload, isDay){
  const counts = weekCounts();
  const todayList = sessions.filter(s=>dayKey(s.dateISO)===dayKey(new Date()));
  const todayDomains = new Set(todayList.filter(s=>!PREP_IDS.has(s.programId)).map(s=>domainOf(s.programId)).filter(Boolean));
  const slots = [];
  const submax = programs.find(p=>p.id==="submax");
  // v33 : chaque piste a son propre cycle — décharges et activations sélectives
  const onF=trackOn("escalade"), onM=trackOn("muscu"), onE=trackOn("endurance"), onY=trackOn("yoga");
  const dlF=trackDeload("escalade"), dlM=trackDeload("muscu"), dlE=trackDeload("endurance");
  const anyDl = dlF||dlM||dlE;
  deload = anyDl; // compat note globale
  // Garde-fous PAR DOMAINE : la charge des gros muscles n'affecte jamais les doigts, et inversement
  const hardFinger = weekSessions().filter(s=>domainOf(s.programId)==="doigts" && s.rpe>=9).length >= 2;
  const hardSystemic = weekSessions().filter(s=>{ const d=domainOf(s.programId); return d && d!=="doigts" && s.rpe>=9; }).length >= 3;
  // douleur (5 derniers jours), scindée par domaine d'origine
  const painF = sessions.find(s=>(s.pain||0)>=1 && domainOf(s.programId)==="doigts" && (Date.now()-new Date(s.dateISO).getTime())/864e5 < 5);
  const painLvl = painF ? painF.pain : 0;

  // --- DOIGTS (indépendants de la charge systémique) ---
  const fState = freshState();
  if(onF && counts.doigts < WEEK_TARGETS.doigts.max && !todayDomains.has("doigts") && isDay && !dlF && painLvl<2){
    let ok = true, light = painLvl===1 || hardFinger || (fState && fState.low);
    const lastFinger = sessions.find(s=>domainOf(s.programId)==="doigts");
    if(lastFinger){
      const hrs = (Date.now()-new Date(lastFinger.dateISO))/36e5;
      if(lastFinger.rpe>=9 && hrs<40) light=true;         // grosse séance < 40 h : léger possible, jamais de grosse
      else if(lastFinger.rpe>=8 && hrs<20) light=true;    // dure hier : doigts légers seulement
    }
    if(ok){
      // en léger : sous-max si dispo, sinon l'alternative légère la plus proche avec le matériel du jour
      const soft = pickNext(["submax","tri-elastic","mcx-warm","tri-foot"]);
      const cycF = trackCyc("escalade");
      const pool = (cycF && cycF.rot && ROTATIONS[cycF.rot] && cycF.rot!=="deload") ? ROTATIONS[cycF.rot] : GENERAL_POOLS.doigts;
      const prog = light ? (progAvail(submax) ? submax : soft) : (pickNext(pool) || pickNext(GENERAL_POOLS.doigts));
      if(prog) slots.push({domain:"doigts", prog, light, optional:counts.doigts>=WEEK_TARGETS.doigts.min});
    }
  } else if(onF && dlF && counts.doigts < 2 && !todayDomains.has("doigts")){
    const soft = progAvail(submax) ? submax : pickNext(["submax","tri-elastic","mcx-warm","tri-foot"]);
    if(soft) slots.push({domain:"doigts", prog:soft, light:true, optional:true});
  }
  // --- MUSCLES : tirage / poussée / jambes indépendants, un créneau max par jour ---
  if((onM||onF) && isDay && !MUSCLE_KEYS.some(k=>todayDomains.has(k))){
    const cands = MUSCLE_KEYS.filter(k=>{
      // le tirage appartient à la piste Escalade (tractions) ; poussée/jambes à la piste Muscu
      if(k==="tirage" ? !onF : !onM) return false;
      if(counts[k] >= WEEK_TARGETS[k].max) return false;
      if(groupHardCount(k) >= 2) return false;            // 2 séances dures / semaine / groupe, pas plus
      const lastS = sessions.find(s=>domainOf(s.programId)===k);
      if(lastS && lastS.rpe>=9 && (Date.now()-new Date(lastS.dateISO).getTime())/36e5 < 40) return false; // même groupe, très dur < 40 h
      const painK = sessions.find(s=>(s.pain||0)>=2 && domainOf(s.programId)===k && (Date.now()-new Date(s.dateISO).getTime())/864e5 < 5);
      return !painK; // douleur vive limitée à SON groupe
    });

    });

    const feasible = cands.filter(k=>pickNext(GENERAL_POOLS[k]) || pickTrack(k));
    if(feasible.length){
      const k = feasible[0];
      const prog = pickNext(GENERAL_POOLS[k]);
      const track = pickTrack(k);
      // alternance entre les deux systèmes : programme minuté ↔ mouvement à niveaux
      const lastK = sessions.find(s=>domainOf(s.programId)===k);
      const lastWasTrack = lastK && String(lastK.programId).startsWith("track:");
      const oaLowM = trackOn("oa") && OA.boltCount()>0 && OA.readiness().deload;
      const kDl = ((k==="tirage") ? dlF : dlM) || oaLowM; // décharge de piste OU état respiratoire bas
      if(kDl && prog) slots.push({domain:k, prog, light:true, optional:true}); // décharge : minuté léger, niveaux gelés
      else if(track && (!prog || !lastWasTrack)) slots.push({domain:k, track, optional:counts[k]>=WEEK_TARGETS[k].min});
      else if(prog) slots.push({domain:k, prog, optional:counts[k]>=WEEK_TARGETS[k].min});
    }
  }
  // --- ENDURANCE (autonome : n'affecte jamais les doigts) ---
  if(onE || onM){
    const budgetUsed = weekHardUsed()>=1;
    const yest = sessions.some(s=>s.intensity==="dur" && (Date.now()-new Date(s.dateISO).getTime())<864e5);
    const oaLow = trackOn("oa") && OA.boltCount()>0 && OA.readiness().deload; // BOLT bas ou en baisse
    const canHard = !yest && counts.endurance>=1 && !dlE && !legsFried() && !oaLow; // jambes fraîches obligatoires
    // alternance : si la dernière séance dure était du cardio, c'est au tour du WOD (piste muscu)
    const lastHard = sessions.find(s=>s.intensity==="dur");
    const wodTurn = onM && !dlM && canHard && !budgetUsed && counts.wod<WEEK_TARGETS.wod.max && !todayDomains.has("wod")
      && (!lastHard || domainOf(lastHard.programId)==="endurance");
    if(wodTurn){
      slots.push({ domain:"wod", wod:true, optional:true });
    }
    // le créneau endurance reste TOUJOURS visible : si le tour dur est pris par le WOD,
    // c'est toi qui choisis — le budget se verrouille au premier enregistré
    if(onE && counts.endurance < WEEK_TARGETS.endurance.max && !todayDomains.has("endurance")){
      slots.push({ domain:"endurance", cardio:true, int:canHard?"dur":"facile", light:dlE,
        optional:dlE || counts.endurance>=WEEK_TARGETS.endurance.min });
    }
  }
  // --- GAINAGE (quasi quotidien, y compris jours off et décharge) ---
  if(onM && counts.gainage < WEEK_TARGETS.gainage.max && !todayDomains.has("gainage")){
    const prog = pickNext(GENERAL_POOLS.gainage), track = prog ? null : pickTrack("gainage");
    if(prog) slots.push({domain:"gainage", prog, optional:counts.gainage>=WEEK_TARGETS.gainage.min});
    else if(track) slots.push({domain:"gainage", track, optional:counts.gainage>=WEEK_TARGETS.gainage.min});
  }
  // --- RESPIRATION OA (quotidienne : BOLT du matin + journée guidée) ---
  if(trackOn("oa") && !todayDomains.has("oa")){
    const r = OA.boltCount()>0 ? OA.readiness() : null;
    slots.push({ domain:"oa", oa:true, optional:true,
      why: !r ? "BOLT du matin — calibre ta journée"
        : r.deload ? "BOLT bas : journée respiratoire allégée"
        : `Phase ${r.phase} — journée guidée` });
  }
  // --- YOGA (récupération : jamais un effort de plus, toujours une aide) ---
  if(onY && !todayDomains.has("yoga") && counts.yoga < WEEK_TARGETS.yoga.max){
    const yestHard = sessions.some(s=>s.intensity==="dur" && domainOf(s.programId)!=="yoga"
      && (Date.now()-new Date(s.dateISO).getTime())<864e5);
    const worked = todayDomains.size>0;
    // motifs, du plus fort au plus faible
    const why = painLvl>0 ? "gêne signalée — mobilité douce"
      : anyDl ? "semaine allégée — le moment idéal"
      : yestHard ? "lendemain d'une séance dure — récupération"
      : !isDay ? "jour off — mobilité et respiration"
      : worked ? "après ta séance — récupération assortie"
      : null;
    if(why) slots.push({ domain:"yoga", yoga:true, why, optional:true });
  }
  return { slots, counts, hardFinger, hardSystemic, painLvl, painNote: painF ? (painF.painNote||"") : "", freshLow: !!(fState&&fState.low), freshRatio: fState?fState.ratio:null };
}
const GOAL_TXT = { general:"programme général complet", force:"objectif force", endurance:"objectif endurance", mixte:"cycle mixte force / endurance" };

/* ---- Cycle par blocs (6 / 8 / 12 / 16 semaines) ---- */
const B=(name,weeks,rot)=>({name,weeks,rot});
const F=w=>B("Force",w,"force"), E=w=>B("Endurance",w,"endurance"), M=w=>B("Mixte",w,"mixte"), D=()=>B("Semaine légère",1,"deload"), G=w=>B("Général",w,"general");
const CYCLES = {
  general: {
    6:  [G(5), D()],
    8:  [G(3), D(), G(3), D()],
    12: [G(3), D(), G(3), D(), G(3), D()],
    16: [G(3), D(), G(3), D(), G(3), D(), G(3), D()]
  },
  force: {
    6:  [F(3), M(2), D()],
    8:  [F(3), D(), F(2), M(1), D()],
    12: [F(3), D(), F(3), D(), M(3), D()],
    16: [F(3), D(), F(3), D(), F(3), D(), M(3), D()]
  },
  endurance: {
    6:  [E(3), M(2), D()],
    8:  [E(3), D(), E(2), M(1), D()],
    12: [E(3), D(), E(3), D(), M(3), D()],
    16: [E(3), D(), E(3), D(), E(3), D(), M(3), D()]
  },
  mixte: {
    6:  [F(2), E(2), M(1), D()],
    8:  [F(3), D(), E(3), D()],
    12: [F(3), D(), E(3), D(), M(3), D()],
    16: [F(3), D(), E(3), D(), F(3), D(), M(3), D()]

function cycleBlocks(goal, weeks){ const g = CYCLES[goal] || CYCLES.mixte; return g[weeks] || g[6]; }
function mondayOf(d){ const x=new Date(d); x.setHours(0,0,0,0); x.setDate(x.getDate()-((x.getDay()+6)%7)); return x; }

  return { blocks, total, week, blockName:cur.name, rot:cur.rot, blockWeek:bw+1, blockWeeks:cur.weeks };

/* ---- Progression de lest ---- */
function loadSuggestion(p){
  const prev = sessions.find(x=>x.programId===p.id);
  if(!prev) return null;
  let d=0;
  if(prev.rpe<=6) d=2; else if(prev.rpe===7) d=1; else if(prev.rpe>=9) d=-2;
  return { kg: prev.loadKg + d, delta:d, prev };
}

function lastDoneAt(pid){
  const s = sessions.find(x=>x.programId===pid);

}
function pickNext(list){
  let avail = list.map(id=>programs.find(p=>p.id===id)).filter(Boolean);
  const ok = avail.filter(progAvail);          // filtre par matériel disponible
  if(ok.length) avail = ok;
  else if(equipRestricted()) return null;      // rien de faisable aujourd'hui : on n'invente pas
  avail.sort((a,b)=>lastDoneAt(a.id)-lastDoneAt(b.id)); // le moins récemment fait d'abord
  return avail[0];
}
function todayRec(){
  const now = new Date(), dow = now.getDay();
  const submax = programs.find(p=>p.id==="submax");
  // v33 : dès qu'une piste est active, l'arbitre multi-pistes prend la main
  if(anyTrackOn()){
    const cF = trackCyc("escalade");
    const cycG = (cF && cF.mode==="cycle") ? { week:cF.week-1, total:cF.total, blockName:cF.blockName||"" } : null;
    const isDay = trainDays().includes(dow);

    const deload = ["escalade","muscu","endurance"].some(trackDeload);
    if(!dp.slots.length) return { kind:"genDone", counts:dp.counts, cyc:cycG };

  const lastF = sessions.find(s=>domainOf(s.programId)==="doigts");
  const hrsF = lastF ? (now - new Date(lastF.dateISO))/36e5 : Infinity;
  if(lastF && lastF.rpe>=9 && hrsF<40){
    return { kind:"fatigue", prog:submax,
      reason:`Ta dernière séance doigts (${lastF.programName}) était très dure — RPE ${lastF.rpe} il y a moins de 48 h. Les tissus des doigts récupèrent lentement : sous-maximal léger aujourd'hui. La charge des autres domaines ne compte pas ici — leurs filières sont indépendantes.` };

      : `« ${prog.name} » est un bon point de départ.`;

    else if(sug && sug.delta<0) sugTxt = ` RPE ${sug.prev.rpe} la dernière fois : on redescend à ${sug.kg>0?"+":""}${sug.kg} kg pour consolider.`;
    return { kind:"train", prog, sug, noplan:true,
      reason:`Suggestion du jour. ${rot}${sugTxt} Touche l'icône réglages pour définir tes jours, ton objectif et un cycle sur 6 à 16 semaines — les propositions seront alors planifiées.` };

      reason:`Semaine légère du cycle (sem. ${cyc.week+1}/${cyc.total}) : on décharge volontairement. Sous-maximal uniquement — c'est cette semaine que le corps encaisse les gains des blocs précédents.` };
  }
  const rotKey = cyc ? cyc.rot : (plan.goal in ROTATIONS ? plan.goal : "mixte");
  const prog = pickNext(ROTATIONS[rotKey] || ROTATIONS.mixte);
  const ctx = cyc
    ? `Semaine ${cyc.week+1}/${cyc.total} du cycle — bloc ${cyc.blockName} (${cyc.blockWeek}/${cyc.blockWeeks}).`
    : `Jour d'entraînement (${GOAL_TXT[plan.goal]}).`;
  const rot = lastDoneAt(prog.id)
    ? `« ${prog.name} » est le programme du bloc que tu n'as pas fait depuis le plus longtemps — on fait tourner les stimuli.`
    : `Tu n'as pas encore fait « ${prog.name} » : on l'intègre aujourd'hui.`;
  const sug = loadSuggestion(prog);
  let sugTxt = "";
  if(sug && sug.delta>0) sugTxt = ` Dernière fois : ${sug.prev.loadKg>0?"+":""}${sug.prev.loadKg} kg à RPE ${sug.prev.rpe} → on monte à ${sug.kg>0?"+":""}${sug.kg} kg.`;
  else if(sug && sug.delta<0) sugTxt = ` RPE ${sug.prev.rpe} la dernière fois : on redescend à ${sug.kg>0?"+":""}${sug.kg} kg pour consolider.`;
  return { kind:"train", prog, cyc, sug, reason: ctx+" "+rot+sugTxt };
}

    return;

  let on=t.on, weeks=t.weeks||0, goal=t.goal||"mixte", restart=false;

    goal=b.dataset.g; document.querySelectorAll("#tpG button").forEach(x=>x.classList.toggle("on",x===b)); });

function openPlanSheet(presetGoal){
  const cur = plan ? {goal:plan.goal, days:[...plan.days], cycle:!!plan.cycleStart, weeks:plan.cycleWeeks||6} : {goal:"general", days:[1,2,3,4,5,6], cycle:true, weeks:12};
  if(typeof presetGoal==="string"){ cur.goal=presetGoal; if(presetGoal==="general"&&!plan){ cur.days=[1,2,3,4,5,6]; } }
  const DAYS = [["L",1],["M",2],["M",3],["J",4],["V",5],["S",6],["D",0]];
  sheet(`
    <h3>Calendrier d'entraînement</h3>
    <div class="sub">Tes jours de poutre et ton objectif. La séance du jour s'adapte ensuite à ton historique.</div>
    <div class="field"><label>Objectif</label><div class="goalseg" id="pGoal">
      ${[["general","Général"],["force","Force"],["mixte","Mixte"],["endurance","Endurance"]].map(([v,l])=>`<button data-v="${v}" class="${v===cur.goal?"on":""}">${l}</button>`).join("")}
    </div></div>
    <div class="field"><label>Jours d'entraînement</label><div class="days" id="pDays">
      ${DAYS.map(([l,d])=>`<button data-d="${d}" class="${cur.days.includes(d)?"on":""}">${l}</button>`).join("")}
    </div></div>
    <div class="field"><label>Planification</label>
      <button class="cyctoggle ${cur.cycle?"on":""}" id="pCyc"><span>Cycle par blocs</span><span class="sw"></span></button>
      <div id="pWeeksWrap" style="display:${cur.cycle?"block":"none"};margin-top:10px">
        <div class="goalseg" id="pWeeks">
          ${[6,8,12,16].map(w=>`<button data-w="${w}" class="${w===cur.weeks?"on":""}">${w} sem</button>`).join("")}
        </div>
        <div class="cycrows" id="pCycRows"></div>
      </div>
    </div>
    <p class="hint" style="text-align:left;margin:0 0 16px">Objectif Général : coche 5-6 jours — le plan du jour empile doigts (2-3/sem), muscles (3-4/sem) et gainage (4-5/sem) en respectant la récupération des doigts. Autres objectifs : 2-3 jours de poutre suffisent.</p>
    <div class="row2">
      <button class="btn btn-ghost" id="pCancel">Annuler</button>
      <button class="btn btn-primary" id="pSave">Enregistrer</button>
    </div>
  `);
  function renderCyc(){
    const blocks = cycleBlocks(cur.goal, cur.weeks);
    // semaine courante si le cycle actif a le même objectif et la même durée
    let curWeek = -1;
    if(plan && plan.cycleStart && plan.goal===cur.goal && (plan.cycleWeeks||6)===cur.weeks && cur.cycle){
      const info = cycleInfo(); if(info) curWeek = info.week;
    }
    let acc=0;
    $("#pCycRows").innerHTML = blocks.map(b=>{
      const from=acc+1, to=acc+b.weeks;
      const isCur = curWeek>=acc && curWeek<acc+b.weeks;
      acc+=b.weeks;
      return `<div class="cycrow ${isCur?"cur":""}"><span>${b.name}${isCur?" — en cours":""}</span><span class="wk">sem ${from===to?from:from+"–"+to}</span></div>`;
    }).join("");
    $("#pWeeksWrap").style.display = cur.cycle ? "block" : "none";
    $("#pCyc").classList.toggle("on", cur.cycle);
  }
  renderCyc();
  $("#pGoal").querySelectorAll("button").forEach(b=>b.onclick=()=>{
    $("#pGoal").querySelectorAll("button").forEach(x=>x.classList.remove("on")); b.classList.add("on"); cur.goal=b.dataset.v; renderCyc();
  });
  $("#pWeeks").querySelectorAll("button").forEach(b=>b.onclick=()=>{
    $("#pWeeks").querySelectorAll("button").forEach(x=>x.classList.remove("on")); b.classList.add("on"); cur.weeks=+b.dataset.w; renderCyc();
  });
  $("#pDays").querySelectorAll("button").forEach(b=>b.onclick=()=>{
    const d=+b.dataset.d;
    if(cur.days.includes(d)){ cur.days=cur.days.filter(x=>x!==d); b.classList.remove("on"); }
    else { cur.days.push(d); b.classList.add("on"); }
  });
  $("#pCyc").onclick=()=>{ cur.cycle=!cur.cycle; renderCyc(); };
  $("#pCancel").onclick=closeSheet;
  $("#pSave").onclick=()=>{
    if(!cur.days.length){ toast("Choisis au moins un jour"); return; }
    let cycleStart = null;
    if(cur.cycle){
      // conserve la position si objectif ET durée inchangés, sinon repart de la semaine en cours
      const same = plan && plan.cycleStart && plan.goal===cur.goal && (plan.cycleWeeks||6)===cur.weeks;
      cycleStart = same ? plan.cycleStart : mondayOf(new Date()).toISOString();
    }
    plan={goal:cur.goal, days:cur.days.sort((a,b)=>a-b), cycleStart, cycleWeeks:cur.weeks}; savePlan(); closeSheet(); render();
    toast(cur.cycle ? `Cycle ${cur.weeks} semaines activé` : "Calendrier enregistré");
  };
}

function colorOf(pid){ const p=programs.find(x=>x.id===pid); return p?p.color:"muted"; }
function relDate(iso){
  const d=new Date(iso), now=new Date();
  const diff=Math.floor((now-d)/86400000);
  if(dayKey(d)===dayKey(now)) return "Aujourd’hui";
  if(diff<=1) return "Hier";
  if(diff<7) return `Il y a ${diff} j`;
  return d.toLocaleDateString("fr-FR",{day:"numeric",month:"short"});
}

function drawChart(){

  cv.width=W*dpr; cv.height=H*dpr;
  const g=cv.getContext("2d"); g.scale(dpr,dpr);
  g.clearRect(0,0,W,H);
  const ink=chartInk();
  const padL=34,padR=34,padT=18,padB=34;
  const cw=W-padL-padR, ch=H-padT-padB;
  const maxKg=Math.max(10,...data.map(d=>Math.abs(d.loadKg)));
  const maxMin=Math.max(1,...data.map(d=>d.hangTimeSec/60));
  // grille
  g.strokeStyle=ink.grid; g.lineWidth=1; g.font="600 10px "+"'JetBrains Mono',monospace";
  for(let i=0;i<=3;i++){ const y=padT+ch*i/3; g.beginPath(); g.moveTo(padL,y); g.lineTo(padL+cw,y); g.stroke();
    g.fillStyle=ink.label; g.textAlign="right"; g.fillText(Math.round(maxKg*(1-i/3)),padL-6,y+3); }
  const n=data.length, slot=cw/Math.max(1,n), bw=Math.min(20,slot*0.42);
  data.forEach((d,i)=>{
    const cx=padL+slot*i+slot/2;
    // barre lest (hot)
    const hK=Math.abs(d.loadKg)/maxKg*ch;
    g.fillStyle="#E84E2A"; roundRect(g,cx-bw-1,padT+ch-hK,bw,hK,4);
    // barre temps (cool)
    const hM=(d.hangTimeSec/60)/maxMin*ch;
    g.fillStyle="#14B8A2"; roundRect(g,cx+1,padT+ch-hM,bw,hM,4);
    // date
    g.fillStyle=ink.label; g.textAlign="center"; g.font="600 9px 'JetBrains Mono',monospace";
    const dd=new Date(d.dateISO); g.fillText(dd.getDate()+"/"+(dd.getMonth()+1),cx,H-12);
  });
}
function drawDetChart(hist){
  const cv=document.getElementById("detChart"); if(!cv) return;
  const dpr=window.devicePixelRatio||1, W=cv.clientWidth, H=150;
  cv.width=W*dpr; cv.height=H*dpr;
  const g=cv.getContext("2d"); g.scale(dpr,dpr); g.clearRect(0,0,W,H);
  const ink=chartInk();
  const padL=30,padR=8,padT=22,padB=24, cw=W-padL-padR, ch=H-padT-padB;
  const maxKg=Math.max(4,...hist.map(s=>Math.abs(s.loadKg)));
  g.strokeStyle=ink.grid; g.lineWidth=1;
  for(let i=0;i<=2;i++){ const y=padT+ch*i/2; g.beginPath(); g.moveTo(padL,y); g.lineTo(padL+cw,y); g.stroke();
    g.fillStyle=ink.label; g.font="600 9px 'JetBrains Mono',monospace"; g.textAlign="right";
    g.fillText(Math.round(maxKg*(1-i/2)),padL-5,y+3); }
  const n=hist.length, slot=cw/n, bw=Math.min(22,slot*0.55);
  hist.forEach((s,i)=>{
    const cx=padL+slot*i+slot/2, h=Math.abs(s.loadKg)/maxKg*ch;
    g.fillStyle = s.loadKg<0 ? "#3aa0d6" : "#E84E2A";
    roundRect(g,cx-bw/2,padT+ch-h,bw,Math.max(3,h),4);
    g.fillStyle=ink.strong; g.textAlign="center"; g.font="700 9px 'JetBrains Mono',monospace";
    g.fillText("R"+s.rpe,cx,padT+ch-h-5);
    g.fillStyle=ink.label; g.font="600 8.5px 'JetBrains Mono',monospace";
    const d=new Date(s.dateISO); g.fillText(d.getDate()+"/"+(d.getMonth()+1),cx,H-9);
  });
}
function roundRect(g,x,y,w,h,r){ if(h<=0)return; r=Math.min(r,w/2,h); g.beginPath();
  g.moveTo(x+r,y); g.arcTo(x+w,y,x+w,y+h,r); g.arcTo(x+w,y+h,x,y+h,r); g.arcTo(x,y+h,x,y,r); g.arcTo(x,y,x+w,y,r); g.fill(); }

/* steppers gèrent leur valeur dans step.val */
const step={val:{}};
function stepper(id,label,unit,value,min,max,inc){
  step.val[id]=value;
  return `<div class="field"><label>${label}</label>
    <div class="stepper" data-id="${id}" data-min="${min}" data-max="${max}" data-inc="${inc}">
      <button class="dec">–</button>
      <div class="val"><span class="num">${value}</span>${unit?`<small>${unit}</small>`:""}</div>
      <button class="inc">+</button>
    </div></div>`;
}
function bindSteppers(onChange){
  document.querySelectorAll(".stepper").forEach(s=>{
    const id=s.dataset.id, min=+s.dataset.min, max=+s.dataset.max, inc=+s.dataset.inc;
    const num=s.querySelector(".num");
    const set=v=>{ v=Math.max(min,Math.min(max,v)); step.val[id]=v; num.textContent=v; onChange&&onChange(); };
    let iv,to;
    const hold=(fn)=>{ fn(); to=setTimeout(()=>{ iv=setInterval(fn,80); },380); };
    const clear=()=>{ clearTimeout(to); clearInterval(iv); };
    const dec=()=>set(step.val[id]-inc), incf=()=>set(step.val[id]+inc);
    const bd=s.querySelector(".dec"), bi=s.querySelector(".inc");
    bd.onclick=dec; bi.onclick=incf;
    ["touchstart","mousedown"].forEach(ev=>{ bd.addEventListener(ev,e=>{e.preventDefault();hold(dec);}); bi.addEventListener(ev,e=>{e.preventDefault();hold(incf);}); });
    ["touchend","mouseup","mouseleave","touchcancel"].forEach(ev=>{ bd.addEventListener(ev,clear); bi.addEventListener(ev,clear); });
  });
}

function doExport(){
  const data={ app:"poutre", version:APP_VERSION, exportedAt:new Date().toISOString(),
    programs, sessions, plan, settings, tests, fresh, benchHist:benchHistAll, levels, perf, oa:OA.exportBlob() };
  const blob=new Blob([JSON.stringify(data,null,1)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  const d=new Date();
  a.download=`poutre-sauvegarde-${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}.json`;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(a.href),4000);
  backupMeta.lastExportISO=new Date().toISOString(); backupMeta.snoozeUntilISO=null; saveBk();
  toast("Sauvegarde exportée");
}
function bindBackup(){
  const ex=$("#bkExport"), im=$("#bkImport"), f=$("#bkFile");
  if(!ex) return;
  ex.onclick=()=>{ doExport(); render(); };
  im.onclick=()=>f.click();
  f.onchange=()=>{
    const file=f.files[0]; if(!file) return;
    const r=new FileReader();
    r.onload=()=>{
      try{
        const d=JSON.parse(r.result);
        if(d.app!=="poutre" || !Array.isArray(d.sessions) || !Array.isArray(d.programs)) throw new Error("format");
        // Fusion sans perte : séances dédupliquées par id, programmes remplacés/ajoutés par id
        const sIds=new Set(sessions.map(x=>x.id));
        let addedS=0;
        d.sessions.forEach(x=>{ if(x && x.id && x.dateISO && !sIds.has(x.id)){ sessions.push(x); addedS++; } });
        sessions.sort((a,b)=>new Date(b.dateISO)-new Date(a.dateISO));
        d.programs.forEach(p=>{ if(!p||!p.id) return; const i=programs.findIndex(x=>x.id===p.id); if(i>=0) programs[i]=p; else programs.push(p); });
        if(Array.isArray(d.tests)){
          const tIds=new Set(tests.map(x=>x.id));
          d.tests.forEach(x=>{ if(x&&x.id&&!tIds.has(x.id)) tests.push(x); });
          tests.sort((a,b)=>new Date(b.dateISO)-new Date(a.dateISO)); saveT();
        }
        if(d.fresh && typeof d.fresh.baselineKg==="number"){ fresh=d.fresh; saveFresh(); }
        if(d.levels && typeof d.levels==="object"){ levels={...levels,...d.levels}; }
        if(d.perf && typeof d.perf==="object"){
          Object.entries(d.perf).forEach(([k,arr])=>{
            if(!Array.isArray(arr)) return;
            const cur=perf[k]||[]; const have=new Set(cur.map(e=>e.iso));
            arr.forEach(e=>{ if(e&&e.iso&&!have.has(e.iso)) cur.push(e); });
            cur.sort((a,b)=>new Date(b.iso)-new Date(a.iso)); perf[k]=cur;
          });
        }
        if(d.levels||d.perf) saveLv();
        if(d.oa && typeof d.oa==="object"){ OA.importBlob(d.oa); }
        if(d.benchHist && typeof d.benchHist==="object"){
          Object.entries(d.benchHist).forEach(([k,arr])=>{
            if(!Array.isArray(arr)) return;
            const cur=benchHistAll[k]||[]; const have=new Set(cur.map(e=>e.iso));
            arr.forEach(e=>{ if(e&&e.iso&&!have.has(e.iso)) cur.push(e); });
            cur.sort((a,b)=>new Date(b.iso)-new Date(a.iso)); benchHistAll[k]=cur;
          });
          saveBench();
        }
        if(d.plan!==undefined) plan=d.plan;
        if(d.settings) settings={...settings,...d.settings};
        saveS(); saveP(); savePlan(); store.set("settings",settings);
        f.value=""; render(); toast(addedS?`Import réussi — ${addedS} séance(s) ajoutée(s)`:"Import réussi — déjà à jour");
      }catch(e){ f.value=""; toast("Fichier invalide"); }
    };
    r.readAsText(file);
  };
}

  root.innerHTML=`<div class="sheet-bg"><div class="sheet"><div class="grab"></div>${html}</div></div>`;

   ENDURANCE — générateur sensation-first (porté d'Endurance 2.0)
   ============================================================ */
const CD_DISCS=[["nage","Nage"],["course","Course"],["ht","Home trainer"],["brick","Brick swimrun"],
  ["rando","Rando rapide"],["velo","Vélo route"],["skirando","Ski de rando"],["corde","Corde à sauter"]];
const CD_TIMES=[20,30,45,60,75,90];
const CD_LBL=Object.fromEntries(CD_DISCS);
let cdState = store.get("cdState", { disc:"course", int:"facile", mins:45, brick:"nage" });
function saveCd(){ store.set("cdState", cdState); }
function pw(lo,hi){ const f=settings.ftp; if(!f) return "";
  const a=Math.round(f*lo/100), b=Math.round(f*hi/100); return ` (${lo===hi?a:a+"-"+b} W)`; }
const FX={ z2:"aisance : conversation complète possible (3-4/10)",
  ss:"soutenu : phrases courtes seulement (6-7/10)", vo2:"vif : quelques mots max (8-9/10)" };
const FXN={ z2:"respiration 3 temps confortable — au mur tu parles normalement (3-4/10)",
  ss:"le 2 temps devient nécessaire — au mur, phrases courtes (6-7/10)",
  vo2:"essoufflé en fin de série — au mur, quelques mots après 2-3 respirations (8/10)" };
function tgt(k,lo,hi){ return settings.ftp ? `${FX[k]} · ${lo===hi?lo:lo+"-"+hi} % FTP${pw(lo,hi)}` : FX[k]; }
function buildCardio(disc,intn,mins,brick){
  const name=CD_LBL[disc]||disc;
  if(disc==="brick"){
    if(brick==="indoor"){
      const run=Math.min(20,Math.round(mins*0.35)), ht=Math.max(15,mins-run-4);
      if(intn==="facile") return {title:"Brick indoor · HT + course", sub:`${mins} min · facile`, blocks:[
        `Home trainer ${ht} min en ${tgt("z2",65,75)}`,
        "Transition < 2 min — chaussures prêtes à côté du vélo",
        `Course facile ${run} min — cadence haute, tu dois pouvoir parler`,
        "C'est l'enchaînement qui compte, pas l'allure"]};
      return {title:"Brick indoor · HT + course", sub:`${mins} min · dur`, blocks:[
        "Échauffement HT 10 min progressif",
        `${Math.max(2,Math.round((ht-10)/12))} × 8 min ${tgt("ss",88,92)} / 3 min souple`,
        "Transition < 2 min",
        `Course tempo ${Math.min(15,run)} min sur jambes lourdes — phrases courtes (7/10)`,
        "Retour au calme 5 min marche/trot"]};
    }
    if(intn==="facile"){
      const r1=Math.round(mins*0.35), sw=Math.round(mins*0.25), r2=Math.max(10,mins-r1-sw-4);
      return {title:"Brick swimrun · nage + course", sub:`${mins} min · facile + transitions`, blocks:[
        `Course facile ${r1} min en tenue de swimrun — conversation possible`,
        "Transition rapide — pull-buoy, lunettes, entre dans l'eau sans traîner",
        `Nage continue ${sw} min — ${FXN.z2}`,
        "Transition — repars en courant immédiatement, jambes lourdes",
        `Course facile ${r2} min, retrouve ta foulée`]};
    }
    const reps=Math.max(2,Math.round((mins-15)/13));
    return {title:"Brick swimrun · nage + course", sub:`${mins} min · effort course`, blocks:[
      "Échauffement 10 min course facile + mobilité épaules",
      `${reps} × (course 8 min soutenue — phrases courtes → transition chrono → nage 4 min vive, 2 temps nécessaire)`,
      "Transitions chronométrées : chaque seconde compte le jour J",
      "Retour au calme 5 min trot + nage souple"]};
  }
  if(disc==="ht"){
    if(intn==="facile") return {title:"Home trainer · facile", sub:`${mins} min · Z2`, blocks:[
      "Mise en route 8-10 min en montant doucement",
      `Continu ~${Math.max(15,mins-15)} min en ${tgt("z2",65,75)} · cadence ~90 tr/min`,
      "Reste vraiment facile : si tu ne peux plus discuter, ralentis",
      "Retour au calme 5 min souple"]};
    let w,f;
    if(mins>=75){ w=12; f=`3 × 15 min ${tgt("ss",88,92)} / 5 min souple entre les blocs`; }
    else if(mins>=60){ w=12; f=`2 × 20 min ${tgt("ss",90,90)} / 5-8 min souple entre les blocs`; }
    else if(mins>=45){ w=10; f=`3 × 10 min ${tgt("ss",90,94)} / 5 min souple`; }
    else { w=12; f="2-3 blocs de 10 × (30 s quasi à fond (9/10) / 15 s souple) · 5 min entre blocs"; }
    return {title:"Home trainer · dur", sub:`${mins} min · ${mins>=45?"sweet spot":"30/15"}`, blocks:[
      `Échauffement progressif ${w} min avec 2-3 accélérations courtes`, f, "Retour au calme 8 min souple"]};
  }
  if(intn==="facile"){
    let b;
    if(disc==="nage") b=["Échauffement souple 200-300 m",
      `Nage continue facile ~${Math.max(10,mins-10)} min — ${FXN.z2}`,
      "Quelques éducatifs si tu veux (battements, rattrapé)","Retour au calme 100-200 m"];
    else if(disc==="corde"){ const r=Math.max(3,Math.round(mins/4));
      b=[`${r} × 2 min sauts souples / 1 min repos`,"Rebonds bas, rythme régulier, respiration calme"]; }
    else b=["Mise en route progressive 5-8 min",
      `${name} facile en continu ~${Math.max(10,mins-8)} min — conversation complète possible (3-4/10)`,
      "Tu finis en te sentant capable de continuer"];
    return {title:`${name} · facile`, sub:`${mins} min · continu`, blocks:b};
  }
  const warm=12, cool=8, work=Math.max(8,mins-warm-cool);
  let fmt, fk="ss";
  if(disc==="nage"){ fmt=`${Math.max(4,Math.round(work/2.5))} × 100 m vif / 30 s repos`; fk="vo2"; }
  else if(disc==="corde"){ fmt=`${Math.max(5,Math.round(work/1.5))} × 45 s rapide / 45 s repos`; fk="vo2"; }
  else if(disc==="velo") fmt=`${Math.max(4,Math.round(work/6))} × 3 min fort / 3 min souple`;
  else if(disc==="skirando") fmt=`${Math.max(3,Math.round(work/8))} × 4 min soutenu / récup en descente ou pause`;
  else if(disc==="rando") fmt=`${Math.max(4,Math.round(work/6))} × 3 min en côte soutenu / redescente récup`;
  else fmt=`${Math.max(4,Math.round(work/4))} × 2 min soutenu / 2 min récup`;
  return {title:`${name} · dur`, sub:`${mins} min · intervalles`, blocks:[
    `Échauffement progressif ${warm} min`, fmt,
    `Cible sur les efforts — ${disc==="nage"?FXN[fk]:FX[fk]}`, `Retour au calme ${cool} min`]};
}

/* ---- Budget d'intensité systémique : 1 séance dure/semaine (doigts exclus) ---- */
/* Budget hebdo « 1 très dure » : UNIQUEMENT les efforts exceptionnels —
   Hero WOD (Murph…) et très longues sorties (trail/vélo/alpi ≥ 2 h).
   Les intervalles durs ordinaires n'y touchent pas : ils sont gouvernés
   par la fraîcheur des jambes et le « jamais 2 durs cardio consécutifs ». */
function isEpic(s){
  if(s.programId==="wod" && s.wodId){ const b=BENCH.find(x=>x.id===s.wodId); return !!(b && b.hero); }
  return s.intensity==="dur" && domainOf(s.programId)==="endurance" && (s.minutes||0)>=120;
}
function weekHardUsed(){ return weekSessions().filter(isEpic).length; }
function hardIntensityUsed(){ return weekHardUsed(); }
function legsFried(){ // grosse séance de jambes < 40 h → intervalles verrouillés
  const l = sessions.find(s=>domainOf(s.programId)==="jambes");
  return !!(l && l.rpe>=9 && (Date.now()-new Date(l.dateISO).getTime())/36e5 < 40);
}
function groupHardCount(k){ return weekSessions().filter(s=>domainOf(s.programId)===k && s.rpe>=9).length; }
function hardYesterday(){
  const y=Date.now()-864e5;
  return sessions.some(s=>s.intensity==="dur" && new Date(s.dateISO).getTime()>y);
}

function openCardioSheet(forceInt){
  if(forceInt) cdState.int=forceInt;
  const budgetUsed = hardIntensityUsed()>=1, dayAfter = hardYesterday();
  const locked = budgetUsed || dayAfter;
  if(locked) cdState.int="facile";
  const s = buildCardio(cdState.disc, cdState.int, cdState.mins, cdState.brick);
  sheet(`
    <h3>Séance d'endurance</h3>
    <div class="sub">Sensation d'abord : les repères sont respiratoires, la montre est optionnelle.</div>
    <div class="field"><label>Discipline</label><div class="pills" id="cdD">
      ${CD_DISCS.map(([k,l])=>`<button data-k="${k}" class="${cdState.disc===k?"on":""}">${l}</button>`).join("")}
    </div></div>
    ${cdState.disc==="brick"?`<div class="field"><label>Type de brick</label><div class="goalseg" id="cdB">
      <button data-k="nage" class="${cdState.brick==="nage"?"on":""}">Nage + course</button>
      <button data-k="indoor" class="${cdState.brick==="indoor"?"on":""}">HT + course</button>
    </div></div>`:""}
    <div class="field"><label>Intensité</label><div class="goalseg" id="cdI">
      <button data-k="facile" class="${cdState.int==="facile"?"on":""}">Facile</button>
      <button data-k="dur" class="${cdState.int==="dur"?"on":""}" ${locked?'style="opacity:.45"':""}>Dur</button>
    </div>
    ${locked?`<p class="hint" style="text-align:left;margin:6px 0 0">${budgetUsed?"Budget d'intensité déjà consommé cette semaine (1 séance dure).":"Séance dure hier : on ne fait jamais deux durs de suite."} Tes doigts ne sont pas concernés — filières indépendantes.</p>`:""}
    </div>
    <div class="field"><label>Durée</label><div class="pills" id="cdT">
      ${CD_TIMES.map(t=>`<button data-k="${t}" class="${cdState.mins===t?"on":""}">${t} min</button>`).join("")}
    </div></div>
    <div class="card" style="margin-bottom:14px">
      <div style="font-weight:800;font-size:15px">${esc(s.title)}</div>
      <div class="mono" style="font-size:11.5px;color:var(--muted);margin:3px 0 8px">${esc(s.sub)}</div>
      <ul class="cdblocks">${s.blocks.map(b=>`<li>${esc(b)}</li>`).join("")}</ul>
    </div>
    <div class="row2">
      <button class="btn btn-ghost" id="cdClose">Fermer</button>
      <button class="btn btn-primary" id="cdDone">J'ai fait cette séance</button>
    </div>
  `);
  const re=()=>openCardioSheet();
  document.querySelectorAll("#cdD button").forEach(b=>b.onclick=()=>{ cdState.disc=b.dataset.k; saveCd(); re(); });
  const bb=document.getElementById("cdB");
  if(bb) bb.querySelectorAll("button").forEach(b=>b.onclick=()=>{ cdState.brick=b.dataset.k; saveCd(); re(); });
  document.querySelectorAll("#cdI button").forEach(b=>b.onclick=()=>{
    if(locked && b.dataset.k==="dur"){ toast("Budget d'intensité épuisé cette semaine"); return; }
    cdState.int=b.dataset.k; saveCd(); re(); });
  document.querySelectorAll("#cdT button").forEach(b=>b.onclick=()=>{ cdState.mins=+b.dataset.k; saveCd(); re(); });
  document.getElementById("cdClose").onclick=closeSheet;
  document.getElementById("cdDone").onclick=()=>{ closeSheet(); openCardioLog(s); };
}
function openCardioLog(s){
  let rpe = cdState.int==="dur" ? 8 : 4;
  sheet(`
    <h3>${esc(s.title)}</h3>
    <div class="sub">${esc(s.sub)} — comment c'était ?</div>
    <div class="field"><label>Effort ressenti (RPE)</label><div class="goalseg" id="cd_rpe" style="flex-wrap:wrap">
      ${[2,4,6,8,10].map(v=>`<button data-v="${v}" class="${v===rpe?"on":""}">${v}</button>`).join("")}
    </div></div>
    <div class="mono" id="cd_rpetxt" style="font-size:11.5px;color:var(--muted);font-weight:700;margin:-6px 0 14px"></div>
    ${stepper("cd_min","Durée réelle","min",cdState.mins,5,240,5)}
    <div class="field"><label>Notes</label><textarea class="input" id="cd_notes" placeholder="Sensations, météo, parcours…"></textarea></div>
    <div class="row2">
      <button class="btn btn-ghost" id="cd_skip">Ne pas enregistrer</button>
      <button class="btn btn-primary" id="cd_save">Enregistrer</button>
    </div>
  `);
  const T={2:"Très facile — récupération",4:"Facile — conversation complète",6:"Modéré — phrases courtes",
    8:"Dur — quelques mots max",10:"Maximal — à bout de souffle"};
  const upd=()=>{ const el=document.getElementById("cd_rpetxt"); if(el) el.textContent=`RPE ${rpe} : ${T[rpe]}`; };
  upd(); bindSteppers();
  document.querySelectorAll("#cd_rpe button").forEach(b=>b.onclick=()=>{
    document.querySelectorAll("#cd_rpe button").forEach(x=>x.classList.remove("on"));
    b.classList.add("on"); rpe=+b.dataset.v; upd(); });
  document.getElementById("cd_skip").onclick=()=>{ closeSheet(); render(); };
  document.getElementById("cd_save").onclick=()=>{
    sessions.unshift({ id:uid(), programId:"cardio", programName:s.title, dateISO:new Date().toISOString(),
      grip:CD_LBL[cdState.disc]||cdState.disc, edgeMm:0, loadKg:0, rpe,
      completedReps:1, totalReps:1, hangTimeSec:step.val.cd_min*60,
      disc:cdState.disc, intensity: rpe>=8 ? "dur" : cdState.int, minutes:step.val.cd_min,
      pain:0, painNote:"", notes:document.getElementById("cd_notes").value.trim() });
    saveS(); closeSheet(); tab="progress"; render(); toast("Séance d'endurance enregistrée 🏃");
  };
}

 tape:"Idée de favoriser le nez la nuit — mais preuve limitée et risque d’asphyxie si le nez n’est pas dégagé. Priorité au nasal de jour ; à n’envisager qu’avec un avis médical.",
 nasex:"Garder le nez à l’effort facile/modéré développe l’économie et la tolérance au CO₂ à l’exercice. Ouvre la bouche seulement quand l’intensité devient vraiment élevée.",
 imt:"Renforcer les muscles inspiratoires contre une résistance (appareil) réduit leur coût en oxygène — utile en altitude et à l’effort. Distinct du travail CO₂.",
 band:"Une bande souple autour des côtes te donne un repère pour apprendre l’expansion latérale 360° : tu respires en poussant les côtes vers l’extérieur, poitrine et épaules calmes.",
 ribmob:"La souplesse des côtes et du buste laisse plus de place aux poumons et détend les tensions qui raccourcissent l’apnée. Chez toi, c’est le levier le mieux établi pour allonger l’apnée max — plus que forcer sur le CO₂.",
 diadrop:"Un diaphragme souple et relâché respire plus amplement et se contracte moins vite en apnée. Le relâchement compte autant que la force : c’est un travail de détente, pas d’effort.",
 mbt:"Le MBT mesure ta capacité réelle d’apnée en mouvement, distincte du BOLT (qui reflète surtout ta sensibilité au CO₂). Comme c’est un effort quasi-max, c’est un stimulus : une fois par semaine, dans la fenêtre où le nez est dégagé, accompagné.",
 warmup:"Une série de petites apnées de 5 s entrecoupées de respiration normale : ça relève légèrement le CO₂ et prépare le corps avant une séance, sans fatigue. À garder facile — c’est un échauffement.",
 hast:"La simulation d’altitude : des apnées répétées pendant la marche font descendre l’oxygène du sang vers des niveaux proches de la moyenne altitude, ce qui entraîne ta tolérance à l’hypoxie sans matériel. La reprise en respiration réduite prolonge l’effet ; en jogging, la désaturation est plus marquée.",
 sharkfit:"Même principe que la simulation d’altitude, mais tu ne t’arrêtes jamais : tu continues de marcher pendant la récupération. La charge cardio s’ajoute à l’hypoxie répétée — nettement plus intense, d’où la bonne santé requise.",
 recovend:"Après un effort long, le système nerveux redescend surtout tout seul — la respiration lente (~6/min) accélère le retour au parasympathique et améliore le sommeil. La priorité reste calme, hydratation, apport.",
 recovint:"Après un effort intense, il y a un fort pic sympathique et du lactate. Quelques minutes de mouvement léger évacuent le lactate plus vite qu’au repos ; puis la respiration lente rappelle le sympathique encore élevé. C’est là que le souffle aide le plus.",
 recovwalk:"De petites tenues confortables en marchant freinent la sur-respiration qui suit l’effort et laissent remonter le CO₂ en douceur (effet Bohr) — ça aide à revenir au nasal et peut limiter le resserrement des voies aériennes (asthme d’effort). Le nasal réchauffe et humidifie l’air, ce qui protège davantage. À garder léger : au-delà d’une faim d’air légère tu bascules dans le stimulus hypoxique, contre-productif en récup. Effet réel sur les symptômes, mais pas un traitement — avis médical si asthme d’effort avéré."

function dayBlock(s){
  // bloc du midi selon le jour de semaine, calibré par la zone (0=dim..6=sam)
  var d=new Date().getDay();
  var wk = s<30
    ? [null,['warmup','apnea','ribmob'],['warmup','co2table'],['warmup','apnea','diadrop'],null,['warmup','co2table','ribmob'],['warmup','apnea','mbt']]
    : [null,['warmup','hast','ribmob'],['warmup','vhl'],['warmup','co2table','diadrop'],null,['warmup','o2table'],['warmup','sharkfit','mbt']];
  return wk[d]||null;
}
function dayPlan(){
  var s=lastBolt(),r=readiness();
  if(s==null)return [{t:'Commence ici',ids:['bolt','light','coh']}];

    return [
      {t:'Matin',ids:['unblock','bolt','light','coh']},
      {t:'Journée',ids:['diadrop']},
      {t:'Fin d’après-midi',ids:['unblock','light']},
      {t:'Soir',ids:['sigh','478']}
    ];
  }
  var noon=dayBlock(s);
  var plan=[
    {t:'Matin',ids:['unblock','bolt','light','coh']},
    noon?{t:'Midi — bloc du jour',ids:noon}:{t:'Midi — récupération',ids:['light','diadrop']},
    {t:'Fin d’après-midi',ids:['unblock','light']},
    {t:'Soir',ids:['sigh','478','nadi']}
  ];
  return plan;
}

function beginnerize(p){
  if(!p)return p;
  p=p.replace(/SpO₂ 8[0-4] %/g,'SpO₂ 85 %');
  p=p.replace(/(\d+)(?:-(\d+))? cycles/g,function(m,a,b){return Math.max(4,(+(b||a))-2)+' cycles';});
  p=p.replace(/(\d+) rép/g,function(m,a){return Math.max(4,(+a)-2)+' rép';});
  return p;
}
