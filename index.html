let wakeLock=null;
async function requestWake(){try{if('wakeLock' in navigator){wakeLock=await navigator.wakeLock.request('screen');}}catch(e){}}
function releaseWake(){try{if(wakeLock){wakeLock.release();wakeLock=null;}}catch(e){}}
let activeTimers=[],cancelled=false;let chain=[];
function clearTimers(){activeTimers.forEach(t=>{clearTimeout(t);clearInterval(t);});activeTimers=[];}
function closePlayer(){cancelled=true;clearTimers();releaseWake();chain=[];$('#playerRoot').innerHTML='';}
function logSession(name){oaSessions.push({t:new Date().toISOString(),name:name});if(oaSessions.length>200)oaSessions=oaSessions.slice(-200);save('sf_sess',oaSessions);if(typeof oaJournal==='function')try{oaJournal(name);}catch(e){}}
function playerShell(title,bodyHtml){
  cancelled=false;clearTimers();
  const p=el('div','player');
  p.innerHTML='<div class="ptop"><b>'+title+'</b><button class="pclose" onclick="OA.closePlayer()">Fermer</button></div>'+
    '<div class="pstage" id="pstage">'+(bodyHtml||'')+'</div><div class="pctrl" id="pctrl"></div>';
  $('#playerRoot').innerHTML='';$('#playerRoot').appendChild(p);requestWake();return p;
}
function startBlock(ids){var play=ids.map(exById).filter(function(e){return e&&e.player!=='info';});if(!play.length)return;chain=play.slice(1).map(function(e){return e.id;});openPlayer(play[0]);}
function chainNext(){var id=chain.shift(),e=exById(id);cancelled=true;clearTimers();$('#playerRoot').innerHTML='';if(e){setTimeout(function(){openPlayer(e);},60);}else{releaseWake();}}
function doneBtn(){return chain.length?('<button class="btn block primary" onclick="OA.chainNext()">Suivant · '+(exById(chain[0])?exById(chain[0]).name:'')+' ›</button>'):'<button class="btn block primary" onclick="OA.closePlayer()">Fermer</button>';}
function openPlayer(e){
  if(e.player==='pacer')playPacer(e);
  else if(e.player==='bolt')playBolt(e);
  else if(e.player==='hold')playHold(e);
  else if(e.player==='apnea')playApnea(e);
  else if(e.player==='table')playTable(e);
  else if(e.player==='o2table')playO2Table(e);
  else if(e.player==='reps')playReps(e);
}
function sleep(ms){return new Promise(function(res,rej){const t=setTimeout(function(){cancelled?rej('x'):res();},ms);activeTimers.push(t);});}

function pacerCfg(e){
  var base=e.pacer,ov=timers[e.id]||{};
  var phases=base.phases.map(function(ph,i){return {l:ph.l,k:ph.k,d:(ov.phases&&ov.phases[i]!=null)?ov.phases[i]:ph.d};});
  var cfg={kind:base.kind,phases:phases,note:base.note};
  if(base.cycles!=null)cfg.cycles=(ov.cycles!=null?ov.cycles:base.cycles);
  if(base.secs!=null)cfg.secs=(ov.secs!=null?ov.secs:base.secs);
  return cfg;
}
function playPacer(e){
  const cfg=pacerCfg(e);
  playerShell(e.name,
    '<div class="orb-wrap"><div class="orb-prog" id="oprog"></div><div class="orb-ring"></div><div class="orb '+(cfg.kind==='co2'?'co2':'')+'" id="orb"></div><div class="orb-count" id="pcount"></div></div>'+
    '<div class="phase" id="phase">Prêt ?</div>'+
    '<div class="subt" id="psub">'+(cfg.note||'')+'</div>'+
    '<div class="counters" style="margin-top:8px"><div><b id="ptimer">'+(cfg.cycles?('0/'+cfg.cycles):fmt(cfg.secs))+'</b>'+(cfg.cycles?'cycles':'restant')+'</div></div>');
  $('#pctrl').innerHTML='<button class="btn block primary" id="pgo">Commencer</button>';
  $('#pgo').onclick=function(){$('#pgo').remove();runPacer(e);};
}
async function runPacer(e){
  const cfg=pacerCfg(e),orb=$('#orb');
  let cycle=0,elapsed=0;const total=cfg.secs||0;
  const scaleFor=function(k){return k==='in'?1:k==='in2'?1.08:(k==='out'?0.55:(k==='hold'?1:0.55));};
  function setProg(pp){var o=$('#oprog');if(o)o.style.background='conic-gradient(var(--teal) '+Math.min(100,Math.max(0,pp))+'%, rgba(255,255,255,.05) 0)';}
  async function phaseCountdown(sec){
    let acc=0;$('#pcount').textContent=Math.ceil(sec);
    while(acc<sec-0.001){
      const step=Math.min(1,sec-acc);
      await sleep(step*1000);acc+=step;
      $('#pcount').textContent=Math.max(0,Math.ceil(sec-acc));
      if(cfg.secs){$('#ptimer').textContent=fmt(Math.max(0,total-(elapsed+acc)));setProg((elapsed+acc)/total*100);}
    }
  }
  try{
    await sleep(400);
    while(!cancelled){
      for(let i=0;i<cfg.phases.length;i++){
        const ph=cfg.phases[i],hold=(ph.k==='hold'||ph.k==='pause');
        $('#phase').textContent=ph.l;
        orb.classList.toggle('holding',hold);
        beep(ph.k==='in'||ph.k==='in2'?720:ph.k==='out'?440:560,0.1);
        vibe(hold?60:(ph.k==='out'?[12,40,12]:15));
        orb.style.transitionDuration=ph.d+'s';
        orb.style.transform='scale('+scaleFor(ph.k)+')';
        await phaseCountdown(ph.d);
        elapsed+=ph.d;
        if(cfg.secs)$('#ptimer').textContent=fmt(Math.max(0,total-elapsed));
      }
      cycle++;
      if(cfg.cycles){$('#ptimer').textContent=cycle+'/'+cfg.cycles;setProg(cycle/cfg.cycles*100);if(cycle>=cfg.cycles)break;}
      if(cfg.secs&&elapsed>=total)break;
    }
    if(!cancelled)finishPacer(e);
  }catch(x){}
}
function finishPacer(e){
  beep(880,0.18);vibe([30,40,30]);logSession(e.name);
  $('#phase').textContent='Terminé';$('#ptimer').textContent='✓';
  var pc=$('#pcount');if(pc)pc.textContent='';
  var op=$('#oprog');if(op)op.style.background='conic-gradient(var(--teal) 100%, transparent 0)';
  var ob=$('#orb');if(ob)ob.classList.remove('holding');
  $('#psub').textContent='Belle séance. Laisse la 1re respiration rester calme.';
  $('#orb').style.transform='scale(.7)';
  $('#pctrl').innerHTML=''+doneBtn()+'';
}

function finishBolt(sc){

function boltAdvice(s){
  if(s<20)return'Priorité : respiration légère et cohérence. Les apnées attendront ~20 s. Soigne sommeil et respiration nasale.';
  if(s<30)return'Bonne base. Ajoute apnea walk et la table CO₂ légère. Vise +1 à +2 s/semaine.';
  if(s<40)return'Très bien. Tu peux intégrer la table CO₂ et l’apnée en mouvement.';
  return'Optimal. Maintiens ce niveau ~6 mois ; l’apnée en mouvement est accessible.';
}

  function startSet(){
    set++;$('#cs').textContent=set;$('#ptimer').textContent='Série '+set+'/'+cf.sets;
    $('#phase').textContent=cf.cue;$('#psub').innerHTML='Effort en apnée. Stoppe à une faim d’air <b>modérée</b> (jamais maximale).';
    beep(500,0.12);vibe(20);

      $('#phase').textContent='Récupération';$('#psub').textContent='Respiration normale : '+cf.recover+'. Souffles calmes, pas d’hyperventilation.';

  ctrl('<button class="btn block primary" id="b">Commencer la 1re série</button>');$('#b').onclick=startSet;

function setProg(which,weeks,level){
  if(which==='alt'){ if(weeks)altWeeks=weeks; if(level)altLevel=level; save('sf_altweeks',altWeeks); save('sf_altlevel',altLevel); }
  else { if(weeks)apWeeks=weeks; if(level)apLevel=level; save('sf_apweeks',apWeeks); save('sf_aplevel',apLevel); }
}
function progData(which){
  const raw = which==='alt' ? (ALT[altWeeks]||ALT[8]) : (APNEA[apWeeks]||APNEA[8]);
  const lvl = which==='alt' ? altLevel : apLevel;
  if(lvl!=='debutant') return raw;
  // mode débutant : beginnerize s'applique aux prescriptions (it.p), comme dans l'app source
  return raw.map(b => ({...b, weeks: b.weeks.map(w => ({...w, items: w.items.map(it => it.p ? {...it, p:beginnerize(it.p)} : it)}))}));
}
function playerOn(){ const r=OAROOT(); return !!(r && r.querySelector('.player')); }
function guardStart(){
  const sessEl=document.getElementById('session');
  if(sessEl && sessEl.classList.contains('on')){ toast("Termine d'abord la séance en cours"); return false; }
  if(typeof YogaPlayer!=='undefined' && YogaPlayer.isOn()){ toast("Termine d'abord ta pratique de yoga"); return false; }
  return true;
}
const _open = openPlayer;
openPlayer = function(e){ if(!guardStart()) return; _open(e); };
return {
  EX, CATS, EXPLAIN, SAFETY_TXT,
  exById, exByCat, doneMap,
  boltZone, lastBolt, boltTrend, readiness, dayPlan,
  startBlock, chainNext, closePlayer, openPlayer:(id)=>{ const e=exById(id); if(e) openPlayer(e); },
  playerOn, fmt,
  progGet:(w)=>({ weeks: w==='alt'?altWeeks:apWeeks, level: w==='alt'?altLevel:apLevel, blocks: progData(w) }),
  progSet:setProg,
  boltCount:()=>boltHist.length,
  boltToday:()=>{ const b=boltHist[boltHist.length-1]; return !!(b && String(b.t||"").slice(0,10)===todayISO()); },
  exportBlob:()=>({ bolt:boltHist, sess:oaSessions, metrics, set:oaSet, timers,
    retmax:load('sf_retmax',null), expmax:load('sf_expmax',null),
    altWeeks, altLevel, apWeeks, apLevel }),
  importBlob:(d)=>{ if(!d) return;
    if(Array.isArray(d.bolt)){ const have=new Set(boltHist.map(x=>x.t)); d.bolt.forEach(x=>{ if(x&&x.t&&!have.has(x.t)) boltHist.push(x); }); boltHist.sort((a,b)=>a.t<b.t?-1:1); save('sf_bolt',boltHist); }
    if(Array.isArray(d.sess)){ oaSessions=d.sess.slice(-200); save('sf_sess',oaSessions); }
    if(d.timers){ timers={...timers,...d.timers}; save('sf_timers',timers); }
    if(d.retmax!=null) save('sf_retmax',d.retmax);
    if(d.expmax!=null) save('sf_expmax',d.expmax);
    if(d.altWeeks) setProg('alt',d.altWeeks,d.altLevel);
    if(d.apWeeks) setProg('ap',d.apWeeks,d.apLevel);
  }
};
})();

function svgFor(sk,size,color){
  const a=lookup(PMAP,sk); if(!a||!PICTO[a]) return '';
  const p=PICTO[a], col=color||'var(--aqua)';
  let inner='';
  (p.c||[]).forEach(c=>{ inner+=`<circle cx="${c[0]}" cy="${c[1]}" r="${c[2]}" fill="none"/>`; });
  if(p.h) inner+=`<circle cx="${p.h[0]}" cy="${p.h[1]}" r="7" fill="${col}" stroke="none"/>`;
  (p.l||[]).forEach(l=>{ inner+=`<polyline points="${l}"/>`; });
  return `<svg class="picto" viewBox="0 0 100 100" width="${size}" height="${size}" fill="none" stroke="${col}" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">${inner}</svg>`;
}


function gong(freq=220,dur=1.4,vol=.25){
  if(!settings.sound) return;
  try{
    actx = actx || new (window.AudioContext||window.webkitAudioContext)();
    if(actx.state==='suspended') actx.resume();
    const o=actx.createOscillator(), g=actx.createGain();
    o.type='sine'; o.frequency.value=freq;
    g.gain.setValueAtTime(vol,actx.currentTime);
    g.gain.exponentialRampToValueAtTime(.0001,actx.currentTime+dur);
    o.connect(g); g.connect(actx.destination);
    o.start(); o.stop(actx.currentTime+dur);
  }catch(e){}
}

function speak(txt){
  if(!voiceOn || !TTS) return;
  try{
    TTS.cancel();
    const u=new SpeechSynthesisUtterance(txt);
    if(frVoice) u.voice=frVoice;
    u.lang='fr-FR'; u.rate=.95; u.pitch=1;

  }catch(e){}
}
function speakPose(s){

  if(s.fr && s.fr!==s.sk) txt+='. '+s.fr;
  if(s.side) txt+='. '+s.side;
  if(s.t) txt+= s.t>=120? `. ${Math.round(s.t/60)} minutes.` : `. ${s.t} secondes.`;
  else txt+=`. ${s.b} souffles.`;
  const cue=cueOf(s.sk); if(cue) txt+=' '+cue+'.';
  const vt=varText(s.sk); if(vt) txt+=' Variante '+LVL_LABEL[level].toLowerCase()+' : '+vt+'.';

function orbAnim(orb){
  if(orb._anim) orb._anim.cancel();
  if(REDUCED || !orb.animate){ orb.style.transform='scale(.85)'; return; }
  const tot=(_insp()+_exp())*1000;
  try{ orb._anim=orb.animate([

    {transform:'scale(1)',   offset:_insp()/(_insp()+_exp()), easing:'ease-in-out'},
    {transform:'scale(.62)', offset:1}
  ],{duration:tot, iterations:Infinity});
}catch(e){}
}

  orb.style.transform='scale(.85)';

const session={on:false,list:[],idx:0,phase:0,paused:false,timer:null,left:0,start:0};

function buildSteps(poses){
  // Décompose les postures bilatérales en 2 étapes (droite / gauche)
  const steps=[];
  poses.forEach(p=>{
    if(p.sides){
      steps.push({...p,side:'côté droit'});
      steps.push({...p,side:'côté gauche'});
    } else steps.push({...p});
  });
  return steps;
}
function startSession(poses,title){
  bindOnce();
  session.list=buildSteps(poses);
  session.idx=0; session.on=true; session.paused=false; session.start=Date.now();
  document.getElementById('pTitle').textContent=title;
  document.getElementById('yplayer').classList.add('on');
  document.getElementById('pMain').style.display='flex';
  document.getElementById('pCtrl').style.display='flex';
  document.getElementById('doneMsg').style.display='none';
  document.body.style.overflow='hidden';
  lockScreen(); gong(330,.8,.15);
  loadStep();
}
function loadStep(){
  const s=session.list[session.idx];
  if(!s){ finishSession(); return; }
  document.getElementById('pPose').textContent=s.sk;
  document.getElementById('pFr').textContent=s.fr;
  document.getElementById('pSide').textContent=s.side||'';
  document.getElementById('pCue').textContent=cueOf(s.sk);
  document.getElementById('pPicto').innerHTML=svgFor(s.sk,56);
  updateVarLine();
  const nx=session.list[session.idx+1];
  document.getElementById('pNext').innerHTML = nx? `Suivant : <b>${esc(nx.sk)}${nx.side?' — '+nx.side:''}</b>` : 'Dernière posture 🌊';
  document.getElementById('pProg').style.width = (session.idx/session.list.length*100)+'%';
  const orb=document.getElementById('orb');
  if(s.t){ session.left=s.t; session.mode='time'; stopOrb(orb); }
  else{ session.left=s.b; session.mode='breath'; orbAnim(orb); }
  speakPose(s);
  updateCount();
  tickStart();
}
function tickStart(){
  clearInterval(session.timer);
  const iv = session.mode==='breath' ? (_insp()+_exp())*1000 : 1000;
  session.timer=setInterval(()=>{
    if(session.paused) return;
    session.left--;
    if(session.left<=0){ gong(); session.idx++; loadStep(); }
    else updateCount();
  },iv);
}
function updateCount(){
  const c=document.getElementById('pCount');
  c.textContent = session.mode==='breath' ? session.left : fmtClock(session.left);
  if(session.mode==='breath' && session.left===1) speak('Dernier souffle');
  else if(session.mode==='time' && session.left===30 && session.list[session.idx] && session.list[session.idx].t>=90) speak('30 secondes');
}
function fmtClock(s){ const m=Math.floor(s/60),ss=s%60; return m+':'+String(ss).padStart(2,'0'); }
function togglePause(){
  session.paused=!session.paused;
  document.getElementById('pPause').textContent=session.paused?'▶':'⏸';
  const orb=document.getElementById('orb');
  if(orb._anim){ session.paused? orb._anim.pause() : orb._anim.play(); }
  if(session.paused && TTS) TTS.cancel();
}
function nextPose(){ gong(260,.6,.12); session.idx++; loadStep(); }
function prevPose(){ if(session.idx>0){ session.idx--; loadStep(); } }
function finishSession(){
  clearInterval(session.timer);
  document.getElementById('pProg').style.width='100%';
  document.getElementById('pMain').style.display='none';
  document.getElementById('pCtrl').style.display='none';
  document.getElementById('doneMsg').style.display='flex';
  const mins=Math.round((Date.now()-session.start)/60000);
  document.getElementById('doneStats').textContent=`${session.list.length} étapes · ${mins} min sur le tapis`;
  if(onDoneCb){ try{ onDoneCb({steps:session.list.length, mins:Math.max(1,mins)}); }catch(e){} onDoneCb=null; }
  gong(196,2.2,.3); setTimeout(()=>gong(262,2.2,.2),700);
  setTimeout(()=>speak('Namasté. Belle pratique.'),900);
  unlockScreen();
}
function stopSession(){
  clearInterval(session.timer);
  if(onCloseCb){ try{ onCloseCb(); }catch(e){} onCloseCb=null; }
  session.on=false;
  if(TTS) TTS.cancel();
  document.getElementById('yplayer').classList.remove('on');
  document.body.style.overflow='';
  unlockScreen();
}

function cycleLevel(){
  const ks=Object.keys(LVL_LABEL); level=ks[(ks.indexOf(level)+1)%ks.length];
  store.set('yglvl',level);
  const b=document.getElementById('pLvl'); if(b) b.textContent=LVL_LABEL[level];
  updateVarLine();
}
let bound=false;
function bindOnce(){
  if(bound) return; bound=true;
  const g=id=>document.getElementById(id);
  g('pLvl').textContent=LVL_LABEL[level];
  g('pLvl').onclick=cycleLevel;
  g('ypClose').onclick=stopSession;
  g('ypDone').onclick=stopSession;
  g('pPause').onclick=togglePause;
  g('ypPrev').onclick=prevPose;
  g('ypNext').onclick=nextPose;
}
return {
  start(poses,title,onDone,onClose){
    const sessEl=document.getElementById('session');
    if(sessEl && sessEl.classList.contains('on')){ toast('Termine d\'abord la séance en cours'); return false; }
    if(typeof OA!=='undefined' && OA.playerOn()){ toast('Termine d\'abord ton exercice de respiration'); return false; }
    if(session.on) return false;
    onDoneCb=onDone||null; onCloseCb=onClose||null;
    startSession(poses,title); return true;
  },
  stop(){ if(session.on) stopSession(); },
  isOn(){ return session.on; },
  getLevel(){ return level; },
  setLevel(k){ if(LVL_LABEL[k]){ level=k; store.set('yglvl',k); } },
  levels(){ return LVL_LABEL; },
  voiceOn(){ return voiceOn; },
  toggleVoice
};
})();

/* Rattachement des familles de mouvements aux domaines de Poutre */
const PART_DOMAIN = { "Tirage":"tirage", "Biceps":"tirage", "Avant-bras":"tirage",
  "Poussée":"poussee", "Épaules":"poussee", "Skill":"poussee",
  "Jambes":"jambes", "Mollets":"jambes", "Ischios":"jambes", "Fessiers":"jambes",
  "Explosivité":"jambes", "Charge":"jambes", "Tronc":"gainage" };
let levels = store.get("levels", {});
let perf   = store.get("perf", {});
function saveLv(){ store.set("levels", levels); store.set("perf", perf); }
function lvlOf(id){ return levels[id]||0; }
function perfOf(id){ if(!perf[id]) perf[id]=[]; return perf[id]; }
function trackDomain(t){ return PART_DOMAIN[t.part] || "jambes"; }
function trackAvail(t){ const eq=equipSet(); return !t.need || t.need.some(e=>eq.has(e)); }
function levelAvail(l){ const eq=equipSet(); return !l.need || l.need.some(e=>eq.has(e)); }
function parseTarget(str){
  const o={sets:4,lo:null,hi:null,unit:"reps",perSide:false,load:false,ok:false};
  if(!str) return o;
  o.perSide=/c[oô]t[eé]|\/bras|\/jambe/i.test(str);
  o.load=/charge/i.test(str);
  const sm=str.match(/^\s*(\d+)\s*[×x]/); if(sm) o.sets=+sm[1];
  const parts=str.split(/[×x]/);
  if(parts[1]){
    const tm=parts[1].match(/\s*(\d+)(?:\s*[-–]\s*(\d+))?\s*(s|m)?/);
    if(tm){ o.lo=+tm[1]; o.hi=tm[2]?+tm[2]:+tm[1];
      if(tm[3]==="s") o.unit="sec"; else if(tm[3]==="m") o.unit="dist"; o.ok=true; }
  }
  return o;
}
function gradeSets(arr,lo,hi){
  if(!arr.length) return "stay";
  const avg=arr.reduce((a,b)=>a+b,0)/arr.length;
  if(avg>=hi) return "up";
  if(avg<lo) return "down";
  return "stay";
}
function levelStreak(id,lvl){
  const arr=perfOf(id).filter(p=>p.level===lvl && !p.deload);
  if(!arr.length) return {dir:null,n:0};
  const dir=arr[0].grade;
  if(dir==="stay") return {dir:"stay",n:1};
  let n=0; for(const p of arr){ if(p.grade===dir) n++; else break; }
  return {dir,n};
}
function isDeloadWeek(){ return trackDeload("muscu"); }

function openTrackList(domain){
  const dom = domain || null;
  const list = TRACKS.filter(t=>trackAvail(t) && (!dom || trackDomain(t)===dom));
  const byPart = {};
  list.forEach(t=>{ const d=trackDomain(t); (byPart[d]=byPart[d]||[]).push(t); });
  sheet(`
    <h3>Force à niveaux</h3>
    <div class="sub">${TRACKS.length} mouvements avec échelles de progression : l'app te fait monter d'un cran quand tu maîtrises, redescendre si ça coince. Complémentaire du système RPE + charge des programmes.</div>
    <div style="max-height:56vh;overflow:auto;margin-bottom:14px">
      ${Object.entries(byPart).map(([d,ts])=>`
        <h2 style="margin:14px 0 4px">${POOL_TXT[d]||d}</h2>
        ${ts.map(t=>{
          const lv=lvlOf(t.id), cur=t.levels[Math.min(lv,t.levels.length-1)];
          return `<div class="prow track-row" data-id="${t.id}">
            <span class="pdot" style="background:${POOL_DOT[trackDomain(t)]}"></span>
            <div class="pmain"><div class="pn">${esc(t.name)}</div>
            <div class="ps">Niv. ${lv+1}/${t.levels.length} · ${esc(cur.n)} · ${esc(cur.s)}</div></div>
            <span style="color:var(--muted);font-size:18px">›</span>
          </div>`;
        }).join("")}
      `).join("")}
    </div>
    <button class="btn btn-ghost btn-block" id="tlClose">Fermer</button>
  `);
  document.querySelectorAll(".track-row").forEach(el=>el.onclick=()=>openTrack(el.dataset.id));
  document.getElementById("tlClose").onclick=closeSheet;
}

let pendingVerdict=null, lastLevelChange=null;
function openTrack(id){
  const t=TRACKS.find(x=>x.id===id); if(!t) return;
  const lv=Math.min(lvlOf(id), t.levels.length-1), cur=t.levels[lv];
  const tg=parseTarget(cur.s), h=perfOf(id).slice(0,5);
  const dl=isDeloadWeek();
  sheet(`
    <h3>${esc(t.name)}</h3>
    <div class="sub">${esc(t.part)} · niveau ${lv+1} sur ${t.levels.length}${dl?" · semaine allégée (le niveau ne bougera pas)":""}</div>
    <div class="card" style="margin-bottom:12px;border-color:rgba(20,184,162,.45)">
      <div style="font-weight:800;font-size:15px">${esc(cur.n)}</div>
      <div class="mono" style="font-size:12px;color:var(--cool-deep);font-weight:700;margin-top:3px">Objectif : ${esc(cur.s)}</div>
      ${cur.a?`<div style="font-size:12.5px;color:var(--muted);margin-top:6px">Passage au niveau suivant : ${esc(cur.a)}</div>`:""}
      ${!levelAvail(cur)?`<div style="font-size:12px;color:var(--hot-deep);margin-top:6px">⚠ Matériel manquant pour ce niveau — coche-le dans Réglages ou choisis un autre palier.</div>`:""}
    </div>
    ${verdictHTML()}
    <div class="field"><label>Tes séries${tg.perSide?" (par côté)":""} — ${tg.unit==="sec"?"secondes":tg.unit==="dist"?"mètres":"répétitions"}</label>
      <div style="display:flex;gap:6px" id="setInputs">
        ${Array.from({length:Math.min(6,tg.sets||4)},(_,i)=>`<input class="input" inputmode="numeric" style="text-align:center;padding:12px 4px" placeholder="${i+1}">`).join("")}
      </div>
    </div>
    ${tg.load?`<div class="field"><label>Charge utilisée (kg)</label><input class="input" id="kgInput" inputmode="decimal" placeholder="ex. 16"></div>`:""}
    <div class="row2" style="margin-bottom:10px">
      <button class="btn btn-ghost" id="tkDown">↓ Niveau</button>
      <button class="btn btn-ghost" id="tkUp">↑ Niveau</button>
    </div>
    <button class="btn btn-primary btn-block" id="tkSave" style="margin-bottom:12px">Valider la séance</button>
    ${h.length?`<div style="font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);font-weight:800;margin-bottom:6px">Historique</div>
      ${h.map(p=>`<div class="wgrid"><span class="wl">${relDate(p.iso)}</span><b>N${(p.level||0)+1}</b><b>${p.sets?p.sets.join(" · "):esc(p.note||"—")}</b><b class="${p.grade==="up"?"ok":p.grade==="down"?"ko":""}">${p.grade==="up"?"▲":p.grade==="down"?"▼":"="}</b></div>`).join("")}`:""}
    <button class="btn btn-ghost btn-block" id="tkBack" style="margin-top:12px">Retour</button>
  `);
  document.getElementById("tkBack").onclick=()=>{ pendingVerdict=null; openTrackList(); };
  document.getElementById("tkUp").onclick=()=>{ if(lv<t.levels.length-1){ levels[id]=lv+1; saveLv(); pendingVerdict=null; lastLevelChange=null; openTrack(id); } };
  document.getElementById("tkDown").onclick=()=>{ if(lv>0){ levels[id]=lv-1; saveLv(); pendingVerdict=null; lastLevelChange=null; openTrack(id); } };
  document.getElementById("tkSave").onclick=()=>{
    const sets=[];
    document.querySelectorAll("#setInputs input").forEach(inp=>{ const v=parseInt(inp.value,10); if(!isNaN(v)&&v>=0) sets.push(v); });
    if(!sets.length){ toast("Note au moins une série"); return; }
    const grade=gradeSets(sets,tg.lo,tg.hi);
    const kgIn=document.getElementById("kgInput");
    let kg=kgIn?parseFloat(kgIn.value):null; if(isNaN(kg)||kg<=0) kg=null;
    perfOf(id).unshift({ iso:new Date().toISOString(), level:lv, sets, grade, unit:tg.unit, deload:dl, kg });
    lastLevelChange=null;
    if(!tg.load && !dl){
      const st=levelStreak(id,lv);
      if(st.dir==="up" && st.n>=2 && lv<t.levels.length-1){ levels[id]=lv+1; lastLevelChange={id,from:lv,to:lv+1}; }
      else if(st.dir==="down" && st.n>=2 && lv>0){ levels[id]=lv-1; lastLevelChange={id,from:lv,to:lv-1}; }
    }
    saveLv();
    pendingVerdict={ grade, load:tg.load, deload:dl, maxed:lv>=t.levels.length-1, base:lv<=0 };
    // la séance compte dans les quotas du domaine
    sessions.unshift({ id:uid(), programId:"track:"+id, programName:`${t.name} — ${cur.n}`,
      dateISO:new Date().toISOString(), grip:t.part, edgeMm:0, loadKg:kg||0,
      rpe: grade==="down"?9:grade==="up"?6:8, completedReps:sets.length, totalReps:tg.sets||sets.length,
      hangTimeSec:0, pain:0, painNote:"", notes:sets.join(" · ")+(kg?` · ${kg} kg`:"") });
    saveS();
    vibrate(lastLevelChange ? 60 : 25);
    openTrack(id);
  };
}
function verdictHTML(){
  if(!pendingVerdict) return "";
  const v=pendingVerdict;
  const box=(cls,txt)=>`<div class="card" style="margin-bottom:12px;border-color:${cls==="up"?"rgba(20,184,162,.55)":cls==="down"?"rgba(232,78,42,.45)":"var(--line)"}"><p style="font-size:13.5px;margin:0">${txt}</p>${lastLevelChange?'<button class="btn btn-ghost btn-sm" id="tkUndo" style="margin-top:8px">Annuler le changement</button>':""}</div>`;
  if(lastLevelChange){
    return lastLevelChange.to>lastLevelChange.from
      ? box("up","Tu maîtrises ce niveau — passage au niveau suivant.")
      : box("down","On redescend d'un cran pour consolider proprement.");
  }
  if(v.deload) return box("stay","Semaine allégée — séance notée, le niveau ne bouge pas. Garde de la réserve.");
  if(v.load){
    if(v.grade==="up") return box("up","Cible atteinte — la prochaine fois, monte la charge de 2 à 4 kg.");
    if(v.grade==="down") return box("down","En dessous de la cible — réduis un peu la charge.");
    return box("stay","Dans la cible — garde cette charge et vise le haut de la fourchette.");
  }
  if(v.grade==="up") return v.maxed
    ? box("up","Niveau max atteint et maîtrisé. Bravo.")
    : box("up","Belle séance ! Encore une comme ça et l'app te fait monter.");
  if(v.grade==="down") return v.base
    ? box("down","Niveau de base — persévère, ça va venir.")
    : box("down","Séance difficile. Si ça se répète, l'app te redescendra d'un cran.");
  return box("stay","Séance notée. Reste à ce niveau et vise le haut de la fourchette.");
}

const BENCH_SCORE = new Set(["cindy","chelsea","mary","nicole","lynne","tabata","fgb","chief","deathby","nate","mcghee"]);
const BENCH_FILTERS = [["all","Tous"],["bench","Benchmarks"],["hero","Heroes"],["court","Courts < 20 min"],["long","Longs ≥ 30 min"]];
const EQUIP_ALL = [["poutre","Poutre / hangboard"],["triangle","Triangles YY"],["minicrux","Mini Crux"],
  ["barre","Barre de traction"],["kb","Kettlebells"],["box","Box / step"],["mb","Medicine ball"],
  ["trx","TRX"],["elastique","Élastiques"],["anneaux","Anneaux"],["gilet","Gilet lesté"]];
const EQUIP_DEFAULT = ["poutre","triangle","minicrux","barre","kb","box","mb","trx","elastique"];
let benchState = store.get("benchState", { filter:"all", mins:30 });
let benchHistAll = store.get("benchHist", {});
function saveBench(){ store.set("benchState", benchState); store.set("benchHist", benchHistAll); }
let todayEquip = store.get("todayEquip", null); // {day, list} — restriction ponctuelle
function equipSet(){
  if(todayEquip && todayEquip.day===dayKey(new Date())) return new Set(todayEquip.list);
  return new Set(settings.equip || EQUIP_DEFAULT);
}
function equipRestricted(){ return !!(todayEquip && todayEquip.day===dayKey(new Date())); }
function estBenchMin(b){
  if(b.est) return b.est;
  if(BENCH_SCORE.has(b.id)){ const s=(b.sub||"").match(/(\d+)\s*min/i); return s?+s[1]:20; }
  const m=(b.blocks||[]).join(" ").match(/référence\s*:\s*(\d+)/i);
  if(m) return +m[1];
  const s2=(b.sub||"").match(/(\d+)\s*min/i);
  return s2?+s2[1]:20;
}
function benchMatches(b){
  const f=benchState.filter;
  if(f==="bench") return !b.hero;
  if(f==="hero") return !!b.hero;
  if(f==="court") return estBenchMin(b)<20;
  if(f==="long") return estBenchMin(b)>=30;
  return true;
}
function benchAvail(b){ const eq=equipSet(); return !b.need || b.need.every(e=>eq.has(e)); }
function benchHist(id){ if(!benchHistAll[id]) benchHistAll[id]=[]; return benchHistAll[id]; }
function parseScoreVal(s,isScore){
  s=(s||"").trim(); if(!s) return null;
  const m=s.match(/^(\d+)\s*[:hm']\s*(\d{1,2})/);
  if(m) return (+m[1])*60+(+m[2]);
  const n=parseFloat(s.replace(",","."));
  if(isNaN(n)) return null;
  return isScore ? n : n*60;
}
function benchPR(id){
  const isScore=BENCH_SCORE.has(id);
  const h=benchHist(id).filter(e=>e.val!=null);
  if(!h.length) return null;
  return h.reduce((a,b)=>isScore ? (b.val>a.val?b:a) : (b.val<a.val?b:a));
}
function pickBenchByTime(mins){
  const pool = BENCH.filter(b=>benchAvail(b)).filter(b=>{
    const e=estBenchMin(b); return e>=mins*0.6 && e<=mins*1.6;
  });
  const src = pool.length ? pool : BENCH.filter(benchAvail);
  return src[Math.floor(Math.random()*src.length)] || null;
}

          <div class="ps">${esc(b.sub)} · ~${estBenchMin(b)} min${pr?` · 🏆 ${esc(pr.score)}`:""}</div></div>
          <span style="color:var(--muted);font-size:18px">›</span>
        </div>`;
      }).join("")}
    </div>
    <button class="btn btn-ghost btn-block" id="wfClose">Fermer</button>
  `);
  document.querySelectorAll("#wfF button").forEach(b=>b.onclick=()=>{ benchState.filter=b.dataset.k; saveBench(); openWodList(); });
  document.querySelectorAll("#wfT button").forEach(b=>b.onclick=()=>{ benchState.mins=+b.dataset.k; saveBench(); openWodList(); });
  document.getElementById("wfRand").onclick=()=>{ const b=pickBenchByTime(benchState.mins); if(b) openWod(b.id); };
  document.querySelectorAll(".wod-row").forEach(el=>el.onclick=()=>openWod(el.dataset.id));
  document.getElementById("wfClose").onclick=closeSheet;

function openWod(id){
  const b=BENCH.find(x=>x.id===id); if(!b) return;
  const pr=benchPR(id), h=benchHist(id), isScore=BENCH_SCORE.has(id);
  const budgetUsed = weekHardUsed()>=1;
  sheet(`
    <h3>${esc(b.name)}</h3>

    ${pr?`<div class="card" style="margin-bottom:12px;border-color:rgba(221,154,24,.45)"><div class="mono" style="font-size:12px">🏆 Meilleure perf : <b style="color:var(--chalk)">${esc(pr.score)}</b> · ${relDate(pr.iso).toLowerCase()}${h.length>1?` · ${h.length} tentatives`:""}</div></div>`:""}
    <ul class="cdblocks" style="margin-bottom:14px">${b.blocks.map(x=>`<li>${esc(x)}</li>`).join("")}</ul>
    ${budgetUsed?`<p class="hint" style="text-align:left;margin:0 0 12px">⚠ Ton budget d'intensité de la semaine est déjà consommé. Ce WOD s'ajoutera par-dessus — à toi de juger. Tes doigts ne sont pas concernés.</p>`:""}
    <div class="row2">
      <button class="btn btn-ghost" id="wdBack">Retour</button>
      <button class="btn btn-primary" id="wdDone">J'ai fait ce WOD</button>
    </div>
  `);
  document.getElementById("wdBack").onclick=openWodList;
  document.getElementById("wdDone").onclick=()=>openWodLog(b,isScore);
}
function openWodLog(b,isScore){
  let rpe=9;
  sheet(`
    <h3>${esc(b.name)}</h3>
    <div class="sub">${isScore?"Score : nombre de tours ou de reps.":"Temps : format 12:30 ou 12,5 (minutes)."}</div>
    <div class="field"><label>${isScore?"Score (tours / reps)":"Temps"}</label>
      <input class="input" id="wd_score" inputmode="${isScore?"numeric":"text"}" placeholder="${isScore?"ex. 14":"ex. 12:30"}"></div>
    <div class="field"><label>Effort ressenti (RPE)</label><div class="goalseg" id="wd_rpe">
      ${[6,7,8,9,10].map(v=>`<button data-v="${v}" class="${v===rpe?"on":""}">${v}</button>`).join("")}
    </div></div>
    <div class="field"><label>Notes</label><textarea class="input" id="wd_notes" placeholder="Échelles utilisées, ressenti, matériel…"></textarea></div>
    <div class="row2">
      <button class="btn btn-ghost" id="wd_skip">Ne pas enregistrer</button>
      <button class="btn btn-primary" id="wd_save">Enregistrer</button>
    </div>
  `);
  document.querySelectorAll("#wd_rpe button").forEach(x=>x.onclick=()=>{
    document.querySelectorAll("#wd_rpe button").forEach(y=>y.classList.remove("on"));
    x.classList.add("on"); rpe=+x.dataset.v; });
  document.getElementById("wd_skip").onclick=()=>{ closeSheet(); render(); };
  document.getElementById("wd_save").onclick=()=>{
    const raw=document.getElementById("wd_score").value.trim();
    const val=parseScoreVal(raw,isScore);
    const prev=benchPR(b.id);
    if(raw) benchHist(b.id).unshift({ iso:new Date().toISOString(), score:raw, val });
    saveBench();
    sessions.unshift({ id:uid(), programId:"wod", programName:b.name, dateISO:new Date().toISOString(),
      grip:b.hero?"Hero WOD":"Benchmark", edgeMm:0, loadKg:0, rpe,
      completedReps:1, totalReps:1, hangTimeSec:estBenchMin(b)*60,
      wodId:b.id, intensity:"dur", minutes:estBenchMin(b),
      pain:0, painNote:"", notes:(raw?`${raw} · `:"")+document.getElementById("wd_notes").value.trim() });
    saveS(); closeSheet(); tab="progress"; render();
    const isPR = val!=null && (!prev || (isScore ? val>prev.val : val<prev.val));
    toast(isPR ? "Nouveau record 🏆" : "WOD enregistré 🔥");
  };
}

/* ---------- Routine matinale : BOLT à froid → force des doigts → yoga ---------- */
function logYogaQuick(styleKey, s, mins){
  sessions.unshift({ id:uid(), programId:"yoga", programName:s.name, dateISO:new Date().toISOString(),
    grip:STYLE_MENUS[styleKey].title, edgeMm:0, loadKg:0, rpe:3, completedReps:s.poses.length,
    totalReps:s.poses.length, hangTimeSec:mins*60, yogaStyle:styleKey, minutes:mins,
    pain:0, painNote:"", notes:"" });
  saveS();
}
function morningYogaPick(){
  if(trackOn("escalade")){
    const i = STYLE_MENUS.sport.sessions.findIndex(x=>x.name==="Escalade — avant");
    if(i>=0) return { style:"sport", idx:i };
  }
  return { style:"hatha", idx:0 };
}
function fingerWarmupProg(){
  const w = programs.find(p=>p.id==="echauffement");
  if(w && progAvail(w)) return w;
  const m = programs.find(p=>p.id==="mcx-warm");
  return (m && progAvail(m)) ? m : w;
}
function warmupDoneToday(){
  return sessions.some(s=>dayKey(s.dateISO)===dayKey(new Date())
    && (s.programId==="echauffement" || s.programId==="mcx-warm"));
}
function morningSteps(){
  const today = k => weekSessions().some(s=>dayKey(s.dateISO)===dayKey(new Date()) && !PREP_IDS.has(s.programId) && domainOf(s.programId)===k);
  const steps = [];
  steps.push({ k:"bolt", label:"BOLT à froid", sub:"Au réveil, assis, avant tout effort — c'est le seul qui se fait à froid",
    done: OA.boltToday() });
  const y = morningYogaPick(), ys = STYLE_MENUS[y.style].sessions[y.idx];
  steps.push({ k:"yoga", label:"Yoga d'activation", y, ys,
    sub:`${ys.name} · ${yogaMin(ys)} min — réveille épaules et poignets`, done: today("yoga") });
  if(trackOn("escalade")){
    const r = todayRec();
    const slot = (r.slots||[]).find(s=>s.domain==="doigts");
    if(slot){
      const wu = fingerWarmupProg();
      steps.push({ k:"warmup", label:"Échauffement doigts", prog:wu,
        sub:"Montée en charge progressive — obligatoire avant de charger",
        done: warmupDoneToday() });
      steps.push({ k:"doigts", label:"Force des doigts", slot,
        sub: slot.light ? `${slot.prog.name} — léger (récupération en cours)` : slot.prog.name,
        done: today("doigts"), locked: !warmupDoneToday() && !today("doigts") });
    } else {
      steps.push({ k:"doigts", label:"Force des doigts", slot:null,
        sub:"Rien aujourd'hui (garde-fous ou jour off)", done:false });
    }
  }
  return steps;
}
function morningNext(){
  return morningSteps().find(s=>!s.done && !s.locked && (s.k!=="doigts" || s.slot));
}
function morningLaunch(st){
  if(!st) return;
  if(st.k==="bolt"){ oaSafetyCheck(()=>OA.openPlayer("bolt")); return; }
  if(st.k==="warmup" && st.prog){ startSession(st.prog); return; }
  if(st.k==="doigts" && st.slot){
    if(!warmupDoneToday()){
      toast("Jamais à froid — échauffement d'abord 🔥");
      const wu=fingerWarmupProg(); if(wu) startSession(wu);
      return;
    }
    const sug=loadSuggestion(st.slot.prog);
    startSession(sug?{...st.slot.prog,addedKg:sug.kg}:st.slot.prog); return;
  }
  if(st.k==="yoga"){
    YogaPlayer.start(resolvePoses(st.ys.poses), st.ys.name,
      (stats)=>{ logYogaQuick(st.y.style, st.ys, stats.mins); toast("Yoga enregistré 🧘"); },
      ()=>render());
  }
}
function morningCardHTML(){
  if(!anyTrackOn()) return "";
  const steps = morningSteps();
  const allDone = steps.every(s=>s.done || (s.k==="doigts" && !s.slot));
  if(allDone) return `<div class="card" style="border-color:rgba(20,184,162,.4)">
    <div class="rec-head"><div class="rec-badge cool">Routine matinale ✓</div></div>
    <p class="rec-txt" style="margin-top:2px">BOLT, doigts et yoga : tout est fait. Belle matinée.</p></div>`;
  const nx = morningNext();
  return `<div class="card" style="border-color:rgba(46,127,184,.45)">
    <div class="rec-head"><div class="rec-badge cool">Routine matinale</div></div>
    ${steps.map((s,i)=>`<div class="slotrow mr-step" data-i="${i}" style="cursor:pointer;${((!s.done&&s.k==="doigts"&&!s.slot)||s.locked)?"opacity:.5":""}">
      <span class="sdot" style="background:${s.done?"var(--cool)":s.locked?"var(--line)":"var(--line-strong)"}"></span>
      <div class="smain"><div class="st">${s.done?"✓ ":s.locked?"🔒 ":""}${s.label}</div><div class="ss">${esc(s.sub)}</div></div>
      ${(!s.done && !s.locked && (s.k!=="doigts"||s.slot))?`<span style="color:var(--muted);font-size:18px">›</span>`:""}
    </div>`).join("")}
    ${nx?`<button class="btn btn-primary btn-block" id="mrGo" style="margin-top:10px">Étape suivante — ${nx.label}</button>`:""}
  </div>`;
}
function bindMorning(){
  const steps = morningSteps();
  document.querySelectorAll(".mr-step").forEach(el=>el.onclick=()=>{
    const s=steps[+el.dataset.i]; if(s && !s.done) morningLaunch(s);
  });
  const g=document.getElementById("mrGo"); if(g) g.onclick=()=>morningLaunch(morningNext());
}

function oaSafetyCheck(cb){
  if(store.get("sf_safety_seen", false)){ cb(); return; }
  sheet(`
    <h3>Sécurité — à lire une fois</h3>
    <div class="sub">Règles non négociables de la respiration fonctionnelle et de l'apnée à sec.</div>

/* ============================================================
   MOTEUR DE SÉANCE
   ============================================================ */
let SESS=null;
function buildPhases(p){
  const ph=[]; ph.push({kind:"prep",dur:p.prepSec,label:"Préparation"});
  for(let s=0;s<p.sets;s++){
    for(let r=0;r<p.reps;r++){
      ph.push({kind:"hang",dur:p.hangSec,label:"Suspension",set:s,rep:r});
      const lastRep=r===p.reps-1;
      if(!lastRep && p.restRepSec>0) ph.push({kind:"restRep",dur:p.restRepSec,label:"Repos",set:s,rep:r});
    }
    const lastSet=s===p.sets-1;
    if(!lastSet && p.restSetSec>0) ph.push({kind:"restSet",dur:p.restSetSec,label:"Repos de série",set:s});
  }
  ph.push({kind:"done",dur:0,label:"Terminé"});
  return ph;
}
const PHASE_TXT={prep:"Préparation",hang:"Suspension",restRep:"Repos",restSet:"Repos de série",done:"Terminé"};

async function startSession(p){
  if(YogaPlayer.isOn()){ toast("Termine d'abord ta pratique de yoga"); return; }
  if(OA.playerOn()){ toast("Termine d'abord ton exercice de respiration"); return; }
  audio.unlock();
  const phases=buildPhases(p);
  SESS={ p, phases, i:0, remain:phases[0].dur, running:true, lastSec:null, completedReps:0, wl:null };
  $("#sPname").textContent=p.name;
  const sess=$("#session"); sess.classList.add("on");
  buildLadder(p);
  bindSessionControls();
  requestWake();
  loop(performance.now());
}
function requestWake(){
  if(!settings.wake || !("wakeLock" in navigator)) return;
  navigator.wakeLock.request("screen").then(w=>{ if(SESS) SESS.wl=w; }).catch(()=>{});
}
function releaseWake(){ try{ SESS&&SESS.wl&&SESS.wl.release(); }catch(e){} }
document.addEventListener("visibilitychange",()=>{ if(document.visibilityState==="visible" && SESS && SESS.running) requestWake(); });

function buildLadder(p){
  const L=$("#sLadder"); let h="";
  for(let s=0;s<p.sets;s++){
    h+=`<div class="setrow"><div class="setno">S${s+1}</div><div class="rungs">`;
    for(let r=0;r<p.reps;r++) h+=`<div class="rung" data-s="${s}" data-r="${r}"></div>`;
    h+=`</div></div>`;
  }
  L.innerHTML=h;
}
function updateLadder(){
  const cur=SESS.phases[SESS.i];
  document.querySelectorAll(".rung").forEach(el=>{
    const s=+el.dataset.s, r=+el.dataset.r;
    el.classList.remove("cur");
    const done = s<cur.set || (s===cur.set && r<cur.rep) || (cur.kind==="done");
    el.classList.toggle("done", done && !(cur.kind==="hang"&&s===cur.set&&r===cur.rep));
    if(cur.kind==="hang" && s===cur.set && r===cur.rep) el.classList.add("cur");
    // marquer rep terminée quand on est en repos après elle
    if((cur.kind==="restRep"||cur.kind==="restSet") && s===cur.set && r<=cur.rep) el.classList.add("done");
  });
}

let rafId=null;
function loop(t){
  if(!SESS || SESS.ended){ rafId=null; return; }
  if(SESS.running){
    if(SESS.lastT==null) SESS.lastT=t;
    const dt=(t-SESS.lastT)/1000; SESS.lastT=t;
    SESS.remain-=dt;
    const sec=Math.ceil(SESS.remain);
    const cur=SESS.phases[SESS.i];
    // tics de décompte
    if(cur.dur>0 && sec!==SESS.lastSec && sec<=3 && sec>=1){ audio.tick(); vibrate(30); }
    SESS.lastSec=sec;
    if(SESS.remain<=0){ advance(); }
    else paintSession();
  } else { SESS.lastT=null; }
  if(SESS && !SESS.ended) rafId=requestAnimationFrame(loop);
  else rafId=null;
}
function advance(){
  const cur=SESS.phases[SESS.i];
  if(cur.kind==="hang") SESS.completedReps++;
  SESS.i++;
  const nx=SESS.phases[SESS.i];
  if(!nx || nx.kind==="done"){ finishSession(); return; }
  SESS.remain=nx.dur; SESS.lastSec=null; SESS.lastT=null;
  // sons de transition
  if(nx.kind==="hang"){ audio.go(); vibrate([0,60,40,60]); }
  else { audio.rest(); vibrate(80); }
  updateLadder(); paintSession();
}
function paintSession(){
  const cur=SESS.phases[SESS.i];
  const sess=$("#session");
  sess.className="on sess-bg-"+cur.kind;
  $("#sLabel").textContent = cur.kind==="hang" ? (SESS.p.effortLabel||PHASE_TXT.hang) : (PHASE_TXT[cur.kind]||cur.label);
  const sec=Math.max(0,Math.ceil(SESS.remain));
  $("#sCount").innerHTML=`${sec}<small>s</small>`;
  const p=SESS.p;
  let sub="";
  if(cur.kind==="hang"||cur.kind==="restRep") sub=`Rep ${cur.rep+1}/${p.reps} · Série ${cur.set+1}/${p.sets}`;
  else if(cur.kind==="restSet") sub=`Série ${cur.set+1} terminée · série ${cur.set+2}/${p.sets} à venir`;
  else if(cur.kind==="prep") sub=`${p.grip}${p.edgeMm?` · ${p.edgeMm} mm`:""}${p.addedKg?` · ${p.addedKg>0?"+":""}${p.addedKg} kg`:""}`;
  $("#sSub").textContent=sub;
  // prochaine phase
  const nx=SESS.phases[SESS.i+1];
  $("#sNext").textContent = nx && nx.kind!=="done" ? "Ensuite : "+(nx.kind==="hang" ? (SESS.p.effortLabel||PHASE_TXT.hang) : (PHASE_TXT[nx.kind]||""))+` ${nx.dur}s` : "";
  updateLadder();
}
function bindSessionControls(){
  const pauseBtn=$("#sPause");
  const setPause=()=>{ pauseBtn.innerHTML = SESS.running
    ? `<svg viewBox="0 0 24 24"><rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/></svg>Pause`
    : `<svg viewBox="0 0 24 24"><path d="M7 4l12 8-12 8z"/></svg>Reprendre`; };
  setPause();
  pauseBtn.onclick=()=>{ SESS.running=!SESS.running; SESS.lastT=null; if(SESS.running){audio.unlock();requestWake();} setPause(); };
  $("#sSkip").onclick=()=>{ SESS.remain=0; };
  $("#sClose").onclick=()=>{ if(confirm("Arrêter la séance ?")) abortSession(); };
}
function stopLoop(){ if(rafId) cancelAnimationFrame(rafId); rafId=null; }
function abortSession(){
  SESS.ended=true;
  const done=SESS.completedReps, total=SESS.p.sets*SESS.p.reps;
  const p=SESS.p;
  stopLoop(); releaseWake(); $("#session").classList.remove("on");
  const s=SESS; SESS=null;
  if(done>0) openLog(p, done, total);
  else { render(); }
}
function finishSession(){
  SESS.ended=true;
  audio.done(); vibrate([0,80,60,80,60,120]);
  const cur=SESS.phases[SESS.i]||{}; 
  const sess=$("#session"); sess.className="on sess-bg-done";
  $("#sLabel").textContent="Terminé"; $("#sCount").innerHTML="✓";
  $("#sSub").textContent="Belle séance."; $("#sNext").textContent="";
  document.querySelectorAll(".rung").forEach(r=>r.classList.add("done"));
  const p=SESS.p, done=SESS.completedReps, total=p.sets*p.reps;
  stopLoop(); releaseWake();
  setTimeout(()=>{ $("#session").classList.remove("on"); SESS=null; openLog(p,done,total); }, 1100);
}

        if(s.track){ const lv=lvlOf(s.track.id);
          return row(POOL_DOT[s.domain], `${POOL_TXT[s.domain]} — ${esc(s.track.name)}`,
            `Niv. ${lv+1}/${s.track.levels.length} · ${esc(s.track.levels[Math.min(lv,s.track.levels.length-1)].s)}`, "ns-slot", i); }
        if(s.wod) return row(POOL_DOT.wod, "WOD — benchmark ou Hero", `${BENCH.length} au choix · tirage par durée`, "ns-slot", i);
        if(s.cardio) return row(POOL_DOT.endurance, `Endurance — séance ${s.int}`, `${cdState.mins} min · sensation d'abord`, "ns-slot", i);
        const sug=loadSuggestion(s.prog);
        return row(POOL_DOT[s.domain], `${POOL_TXT[s.domain]} — ${esc(s.prog.name)}${s.light?" (léger)":s.optional?" (optionnel)":""}`,
          `≈${Math.round(estDuration(s.prog)/60)} min${sug&&sug.delta!==0?` · lest ${sug.kg>0?"+":""}${sug.kg} kg`:""}`, "ns-slot", i); }).join("")}`:""}
    ${anta.length?`<div style="font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--hot-deep);font-weight:800;margin:12px 0 2px">Antagonistes — recommandé après le tirage</div>
      ${anta.map(a=>row("var(--cool)", esc(a.name), `≈${Math.round(estDuration(a)/60)} min · ${a.sets} série${a.sets>1?"s":""}`, "ns-anta", a.id)).join("")}`:""}
    <button class="btn btn-ghost btn-block" id="nsDone" style="margin-top:12px">Terminé pour aujourd'hui</button>
  `);
  document.querySelectorAll(".ns-slot").forEach(b=>b.onclick=()=>{
    const s=nextSlots[+b.dataset.k]; if(!s) return;
    closeSheet();
    if(s.oa){ openOaHome(); return; }
    if(s.yoga){ const y=yogaSuggest(); openYoga(y.style, STYLE_MENUS[y.style].sessions.indexOf(y.s)); return; }
    if(s.track){ pendingVerdict=null; openTrack(s.track.id); return; }
    if(s.wod){ openWodList(); return; }
    if(s.cardio){ openCardioSheet(s.int); return; }
    const sug=loadSuggestion(s.prog); startSession(sug?{...s.prog,addedKg:sug.kg}:s.prog);
  });
  document.querySelectorAll(".ns-anta").forEach(b=>b.onclick=()=>{
    const a=programs.find(x=>x.id===b.dataset.k); if(a){ closeSheet(); startSession(a); }
  });
  document.getElementById("nsDone").onclick=()=>{ closeSheet(); render(); };
}

/* ---------- Journal post-séance ---------- */
function openLog(p, done, total){
  let rpe=7;
  sheet(`
    <h3>Enregistrer la séance</h3>
    <div class="sub">${esc(p.name)} · ${done}/${total} reps réalisées</div>
    <div class="row2">
      ${stepper("l_kg","Lest utilisé","kg",p.addedKg,-60,80,1)}
      ${stepper("l_edge","Réglette","mm",p.edgeMm,0,50,1)}
    </div>
    <div class="field"><label>Prise</label><div class="selectwrap"><select class="input" id="l_grip">
      ${GRIPS.map(gname=>`<option ${gname===p.grip?"selected":""}>${gname}</option>`).join("")}
    </select></div></div>
    <div class="field"><label>Effort perçu (RPE)</label><div class="rpe" id="l_rpe">
      ${[4,5,6,7,8,9,10].map(v=>`<button data-v="${v}" class="${v===7?"on":""}">${v}</button>`).join("")}
    </div></div>
    <div class="mono" id="l_rpetxt" style="font-size:11.5px;color:var(--muted);font-weight:700;margin:-6px 0 14px"></div>
    <div class="field"><label>Douleur / gêne</label><div class="goalseg" id="l_pain">
      <button data-v="0" class="on">Aucune</button><button data-v="1">Légère</button><button data-v="2">Vive</button>
    </div></div>
    <div class="field" id="l_painw" style="display:none"><input class="input" id="l_painnote" placeholder="Où ? (ex. annulaire droit, poulie A2, épaule…)"></div>
    <div class="field"><label>Notes</label><textarea class="input" id="l_notes" placeholder="Sensations, réglette tenue, ce qui a lâché…"></textarea></div>
    <div class="row2">
      <button class="btn btn-ghost" id="l_skip">Ne pas enregistrer</button>
      <button class="btn btn-primary" id="l_save">Enregistrer</button>
    </div>
  `);
  bindSteppers();
  const RPE_TXT = {
    1:"Très léger — à peine un effort", 2:"Très léger — à peine un effort",
    3:"Léger — échauffement, récupération", 4:"Léger — échauffement, récupération",
    5:"Confortable — beaucoup de réserve", 6:"Modéré — la charge peut monter",
    7:"Solide — 3 reps / secondes de marge", 8:"Dur mais contrôlé — 2-3 s de marge",
    9:"Très dur — à 1 seconde de l'échec", 10:"Échec réel — la prise a lâché"
  };
  const rpeTxt=()=>{ const el=$("#l_rpetxt"); if(el) el.textContent = `RPE ${rpe} : ${RPE_TXT[rpe]}`; };
  rpeTxt();
  $("#l_rpe").querySelectorAll("button").forEach(b=>b.onclick=()=>{
    $("#l_rpe").querySelectorAll("button").forEach(x=>x.classList.remove("on")); b.classList.add("on"); rpe=+b.dataset.v; rpeTxt();
  });
  let pain=0;
  $("#l_pain").querySelectorAll("button").forEach(b=>b.onclick=()=>{
    $("#l_pain").querySelectorAll("button").forEach(x=>x.classList.remove("on")); b.classList.add("on");
    pain=+b.dataset.v; $("#l_painw").style.display = pain>0 ? "block" : "none";
  });
  $("#l_skip").onclick=()=>{ closeSheet(); openNextSheet(p); };
  $("#l_save").onclick=()=>{
    sessions.unshift({
      id:uid(), programId:p.id, programName:p.name, dateISO:new Date().toISOString(),
      grip:$("#l_grip").value, edgeMm:step.val.l_edge, loadKg:step.val.l_kg, rpe,
      completedReps:done, totalReps:total, hangTimeSec:done*p.hangSec,
      pain, painNote: pain>0 ? $("#l_painnote").value.trim() : "",
      notes:$("#l_notes").value.trim()
    });
    saveS(); closeSheet(); tab="progress"; render(); toast("Séance enregistrée 💪");
    openNextSheet(p);
  };
}

/* ============================================================
   PWA : install + service worker
   ============================================================ */
let deferredPrompt=null;
window.addEventListener("beforeinstallprompt",e=>{ e.preventDefault(); deferredPrompt=e; const b=$("#installbar"); if(b) b.classList.add("show"); });
function setupInstall(){
  const bar=$("#installbar"), btn=$("#installBtn");
  if(!bar) return;
  if(deferredPrompt) bar.classList.add("show");
  if(btn) btn.onclick=async()=>{ if(!deferredPrompt) return; deferredPrompt.prompt(); await deferredPrompt.userChoice; deferredPrompt=null; bar.classList.remove("show"); };
}
if("serviceWorker" in navigator){
  window.addEventListener("load",()=>{ navigator.serviceWorker.register("sw.js").catch(()=>{}); });
}

/* ---------- Navigation ---------- */
document.querySelectorAll(".nav button").forEach(b=>b.onclick=()=>{ tab=b.dataset.tab; render(); });
window.addEventListener("resize",()=>{ if(tab==="progress") requestAnimationFrame(drawChart); });

render();
</script>
